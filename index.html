<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRESHBOWL</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f7; padding: 20px; }
    #error { background: #ffebee; color: #b71c1c; padding: 12px; border-radius: 8px; margin-bottom: 16px; white-space: pre-wrap; display: none; }
    #error.show { display: block; }
    .card { background: white; border-radius: 12px; padding: 20px; max-width: 600px; margin: 0 auto; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .title { font-weight: 700; font-size: 20px; }
    .sub { color: #6c6c70; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="error"></div>
  <div class="card">
    <div class="title" id="status">⏳ Loading...</div>
    <div class="sub" id="message">Please wait...</div>
  </div>

  <script>
    // ── Error catcher ──────────────────────────────────────────────
    window.onerror = function(msg, url, line, col, error) {
      const el = document.getElementById('error');
      el.textContent = `❌ ${msg}\nLine: ${line}\n${error ? error.stack : ''}`;
      el.className = 'show';
      document.getElementById('status').textContent = '❌ Error';
      return true;
    };

    // ── Main code ──────────────────────────────────────────────────
    try {
      document.getElementById('status').textContent = '✅ FRESHBOWL is running!';
      document.getElementById('message').textContent = 'If you see this, the app loaded correctly. Now we can add the full features.';
      console.log('FRESHBOWL loaded successfully');
    } catch (e) {
      const el = document.getElementById('error');
      el.textContent = `CATCH ERROR: ${e.message}\n${e.stack || ''}`;
      el.className = 'show';
    }
  </script>
</body>
</html>
