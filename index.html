    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {

      --radius: 16px; --radius-sm: 10px; --radius-full: 9999px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --transition: 0.2s ease;
    }
    [data-theme="dark"] {
      --bg: #0a0e1a;

      --surface2: #1a2338;
      --border: #1e2a3e;
      --text: #ffffff;
      --text2: #a0b4c8;

    html { font-size: 16px; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; padding-bottom: 80px; transition: background var(--transition), color var(--transition); }
    a, button { font-family: var(--font); cursor: pointer; }
    input, select, textarea { font-family: var(--font); background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 10px 14px; width: 100%; font-size: 14px; outline: none; transition: border var(--transition); }

    button.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    button.secondary:hover { background: var(--border); }
    button.outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
    button.outline:hover { background: var(--primary-dim); }
    .container { max-width: 600px; margin: 0 auto; padding: 0 16px; }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: space-between; }
    .header-title { font-size: 18px; font-weight: 800; color: var(--primary); letter-spacing: -0.3px; }

    .header-actions { display: flex; gap: 8px; align-items: center; }
    .header-actions button { background: transparent; padding: 6px 10px; font-size: 20px; color: var(--text2); border-radius: var(--radius-sm); }
    .header-actions button:hover { background: var(--surface2); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; padding: 6px 0 env(safe-area-inset-bottom); z-index: 100; backdrop-filter: blur(12px); }
    .bottom-nav button { background: transparent; color: var(--text2); padding: 6px 12px; font-size: 12px; font-weight: 500; border-radius: var(--radius-sm); display: flex; flex-direction: column; align-items: center; gap: 2px; transition: color var(--transition); }
    .bottom-nav button .icon { font-size: 22px; line-height: 1; }
    .bottom-nav button.active { color: var(--primary); }
    .page { display: none; padding: 16px 0 20px; animation: fadeUp 0.25s ease; }
    .page.active { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
    .card-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; color: var(--primary); cursor: pointer; user-select: none; }

    .card-title .arrow { margin-left: auto; transition: transform 0.2s; font-size: 14px; color: var(--text3); }
    .card-title .arrow.open { transform: rotate(180deg); }
    .card-body { overflow: hidden; max-height: 0; transition: max-height 0.3s ease, padding 0.3s ease; padding: 0 0; }
    .card-body.open { max-height: 1000px; padding: 8px 0 0 0; }
    .card-sub { font-size: 13px; color: var(--text2); margin-bottom: 12px; line-height: 1.5; }

    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    @media (max-width: 480px) { .grid-2 { grid-template-columns: 1fr; } .grid-3 { grid-template-columns: 1fr 1fr; } .dog-profile { flex-direction: column; text-align: center; } .dog-stats { justify-content: center; } .donut-wrap { flex-direction: column; align-items: stretch; } .dashboard-results { grid-template-columns: 1fr 1fr; } }

    // ── Helper: calculate MER ──────────────────────────────────────────────
    function calcMER(dog) {
      const kg = (dog.weight || 65) / 2.2046;
      const rer = 70 * Math.pow(kg, 0.75);
      return rer * (dog.activity || 1.6);
    }

    // ── Rotation Engine ────────────────────────────────────────────────────
    function generateRotation(proteins, favs) {
      // (same as before, omitted for brevity – include full version)
      const mains = proteins.filter(p => !p.includes('Sardine') && !p.includes('Salmon'));
      const fish = proteins.filter(p => p.includes('Sardine') || p.includes('Salmon'));
      while (mains.length < 4) mains.push('Beef (85/15)');
      const mainA = { 1:mains[0], 2:mains[2], 3:mains[1], 4:mains[3] };
      const mainB = { 1:mains[1], 2:mains[3], 3:mains[0], 4:mains[2] };
      const alt   = { 1:fish[0]||mains[0], 2:fish[1]||mains[2], 3:fish[0]||mains[1], 4:fish[1]||mains[3] };
      const base = { /* ... full base ... */ };
      // (I'll keep the full base in the final answer)
      const result = {};
      let idx = 0;
      for (let w = 1; w <= 4; w++) {
        result[w] = {};
        for (const day of DAYS) {
          const b = base[w]?.[day]; if (!b) continue;
          const isAlt = (day === 'Thu' || day === 'Sun');
          const favStarch = favs.starches.length ? favs.starches[idx % favs.starches.length] : b.am.starch;
          const favVeg = favs.vegs.length ? favs.vegs[idx % favs.vegs.length] : b.am.veg;
          const favOrgan = favs.organs.length ? favs.organs[idx % favs.organs.length] : (b.am.organ || '');
          result[w][day] = {
            am: { protein: isAlt ? alt[w] : mainA[w], starch: favStarch, veg: favVeg, organ: favOrgan || null },
            pm: { protein: mainB[w], starch: favs.starches.length ? favs.starches[(idx+1)%favs.starches.length] : b.pm.starch,
                  veg: favs.vegs.length ? favs.vegs[(idx+1)%favs.vegs.length] : b.pm.veg,
                  organ: favs.organs.length ? favs.organs[(idx+1)%favs.organs.length] : b.pm.organ || null },
          };
          idx++;
        }
      }
      return result;
    }

    // ── Other helpers ──────────────────────────────────────────────────────
    function getActiveDog() { return state.dogs.find(d => d.id === state.activeDogId) || state.dogs[0]; }
    function dateKey(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
    function todayKey() { const d = new Date(); return dateKey(d.getFullYear(), d.getMonth(), d.getDate()); }
    function getWeekNumber(y,m,d) { const jan1 = new Date(y,0,1); const doy = Math.round((new Date(y,m,d)-jan1)/86400000); return (Math.floor(doy/7)%4)+1; }
    function getMealForDate(y,m,d,slot) {
      const week = getWeekNumber(y,m,d);
      const day = DAYS[new Date(y,m,d).getDay()];
      const wd = state.rotation[week]; if (!wd) return null;
      const dd = wd[day]; if (!dd) return null;
      return dd[slot] || null;
    }
    function getEffectiveMeal(y,m,d,slot) {
      const sch = getMealForDate(y,m,d,slot);
      if (!sch) return null;
      const key = dateKey(y,m,d) + '_' + slot;
      const sw = state.swaps?.[key] || {};
      return { protein: sw.protein || sch.protein, starch: sw.starch || sch.starch, veg: sw.veg || sch.veg, organ: sw.organ !== undefined ? sw.organ : sch.organ };
    }
    function isFish(p) { return p && (p.includes('Sardine') || p.includes('Salmon')); }

    // ── Nutrition Engine ──────────────────────────────────────────────────
    function zeroNutrients() { const o = {}; NUTRIENT_KEYS.forEach(k => o[k] = 0); return o; }
    function addFood(total, food, oz) {
      if (!food || !oz) return;
      NUTRIENT_KEYS.forEach(k => { if (food[k]) total[k] += food[k] * oz; });
    }
    function calcMealNutrition(y,m,d,slot) {
      const meal = getEffectiveMeal(y,m,d,slot);
      if (!meal) return zeroNutrients();
      const key = dateKey(y,m,d) + '_' + slot;
      const total = zeroNutrients();
      addFood(total, FOODS[meal.protein], 8);
      addFood(total, FOODS[meal.starch], 2.5);
      addFood(total, FOODS[meal.veg], 2.5);
      if (meal.organ) addFood(total, FOODS[meal.organ], 0.5);
      const supps = state.suppChecks?.[key] || {};
      if (supps.eggshell !== false) { total.calcium += 800; }
      if (supps.salt !== false) { total.sodium += 115; total.chloride += 175; total.iodine += 0.10; }
      if (supps.herbcube !== false) { total.vitE += 3.4; total.vitA += 10; total.vitK += 4; }
      if (supps.broth !== false) { const b = FOODS[meal.protein]; if (b) addFood(total, b, 0.75*0.08); }
      const addins = state.addinsLog?.[key] || {};
      Object.keys(addins).forEach(name => {
        const f = FOODS[name]; if (f) addFood(total, f, addins[name]);
      });
      return total;
    }
    function calcNutritionForDateRange(startDate, endDate) {
      const total = zeroNutrients();
      let mealCount = 0, dayCount = 0;
      let cur = new Date(startDate);
      while (cur <= endDate) {
        const y = cur.getFullYear(), m = cur.getMonth(), d = cur.getDate();
        const key = dateKey(y,m,d);
        let dayHasFed = false;
        for (const slot of ['am','pm']) {
          const logKey = key + '_' + slot;
          if (state.fedLog[logKey]) {
            const nut = calcMealNutrition(y,m,d,slot);
            NUTRIENT_KEYS.forEach(k => total[k] += nut[k]);
            mealCount++;
            dayHasFed = true;
          }
        }
        if (dayHasFed) dayCount++;
        cur.setDate(cur.getDate() + 1);
      }
      return { total, mealCount, dayCount };
    }
    function getAAFCOStatus(value, target) {
      if (value < target.min) return 'low';
      if (target.max < 9999 && value > target.max) return 'high';
      return 'ok';
    }

    // ── USDA Lookup ────────────────────────────────────────────────────────
    function searchUSDA(query, callback) {
      if (!state.usdaKey) { callback({ error: 'Please enter your USDA API key in Utilities.' }); return; }
      const url = `https://api.nal.usda.gov/fdc/v1/foods/search?api_key=${state.usdaKey}&query=${encodeURIComponent(query)}&pageSize=10`;
      fetch(url)
        .then(r => r.json())
        .then(data => { if (data.foods) callback(data.foods); else callback({ error: 'No results found.' }); })
        .catch(err => callback({ error: 'Network error. Check your connection.' }));
    }
    function getUSDAFoodDetails(fdcId, callback) {
      if (!state.usdaKey) { callback({ error: 'API key missing.' }); return; }
      const url = `https://api.nal.usda.gov/fdc/v1/food/${fdcId}?api_key=${state.usdaKey}`;
      fetch(url)
        .then(r => r.json())
        .then(data => callback(data))
        .catch(err => callback({ error: 'Failed to fetch details.' }));
    }
    function parseUSDAFood(foodDetail) {
      // same as before
      const nutMap = {
        'Protein': 'protein',
        'Total lipid (fat)': 'fat',
        'Calcium, Ca': 'calcium',
        'Phosphorus, P': 'phosphorus',
        'Potassium, K': 'potassium',
        'Sodium, Na': 'sodium',
        'Chloride, Cl': 'chloride',
        'Magnesium, Mg': 'magnesium',
        'Iron, Fe': 'iron',
        'Copper, Cu': 'copper',
        'Zinc, Zn': 'zinc',
        'Selenium, Se': 'selenium',
        'Vitamin A, IU': 'vitA',
        'Vitamin D': 'vitD',
        'Vitamin E (alpha-tocopherol)': 'vitE',
        'Vitamin K (phylloquinone)': 'vitK',
        'Thiamin': 'vitB1',
        'Riboflavin': 'vitB2',
        'Niacin': 'vitB3',
        'Pantothenic acid': 'vitB5',
        'Vitamin B-6': 'vitB6',
        'Vitamin B-12': 'vitB12',
        'Folate, total': 'folate',
        'Choline, total': 'choline',
        'Manganese, Mn': 'manganese',
        'Iodine, I': 'iodine',
        'Omega-3': 'omega3',
        'Omega-6': 'omega6',
      };
      const per100g = {};
      const entries = foodDetail.foodNutrients || [];
      entries.forEach(e => {
        const name = e.nutrient?.name || e.nutrientName || '';
        const value = e.amount || e.value || 0;
        const unit = e.nutrient?.unitName || e.unitName || '';
        for (const [usdaKey, ourKey] of Object.entries(nutMap)) {
          if (name.includes(usdaKey) || usdaKey.includes(name)) {
            if (unit === 'G') per100g[ourKey] = value * 1000;
            else per100g[ourKey] = value;
            break;
          }
        }
      });
      const factor = 28.3495 / 100;
      const perOz = {};
      NUTRIENT_KEYS.forEach(k => { perOz[k] = (per100g[k] || 0) * factor; });
      perOz._name = foodDetail.description || 'USDA Food';
      return perOz;
    }

    // ── Walk helper: draw map SVG ──────────────────────────────────────────
    function walkRouteToSvg(coords, width, height) {
      if (!coords || coords.length < 2) return '';
      const lats = coords.map(c => c.lat);
      const lngs = coords.map(c => c.lng);
      const minLat = Math.min(...lats);
      const maxLat = Math.max(...lats);
      const minLng = Math.min(...lngs);
      const maxLng = Math.max(...lngs);
      const pad = 10;
      const latRange = maxLat - minLat || 0.001;
      const lngRange = maxLng - minLng || 0.001;
      const pts = coords.map(c => ({
        x: pad + (c.lng - minLng) / lngRange * (width - 2*pad),
        y: height - pad - (c.lat - minLat) / latRange * (height - 2*pad)
      }));
      let d = 'M' + pts[0].x.toFixed(1) + ',' + pts[0].y.toFixed(1);
      for (let i = 1; i < pts.length; i++) {
        d += ' L' + pts[i].x.toFixed(1) + ',' + pts[i].y.toFixed(1);
      }
      return `<svg viewBox="0 0 ${width} ${height}"><rect width="${width}" height="${height}" fill="var(--surface2)" rx="6"/><polyline points="${pts.map(p => p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ')}" stroke="var(--primary)" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/><circle cx="${pts[0].x}" cy="${pts[0].y}" r="4" fill="var(--primary)"/><circle cx="${pts[pts.length-1].x}" cy="${pts[pts.length-1].y}" r="4" fill="var(--error)"/></svg>`;
    }

            <div class="meal-actions"><button class="primary" onclick="toggleFed('${amKey}')">${amFed?'Undo':'Mark Fed'}</button><button onclick="openSwap('${key}','am')">🔄 Swap</button><button onclick="openAddins('${key}','am')">➕ Add</button></div>
          </div>
          <div class="meal-card ${pmFed?'fed':''}">
            <div class="meal-header"><span class="meal-label">PM</span><span class="meal-fed ${pmFed?'':'not'}">${pmFed?'✅ Fed':'Tap to mark fed'}</span></div>
            ${pmMeal ? `<div class="meal-protein">${pmMeal.protein}</div><div class="meal-details">${pmMeal.starch} · ${pmMeal.veg}${pmMeal.organ ? ` · ${pmMeal.organ}` : ''}</div>` : '<div class="text-muted text-sm">No meal</div>'}
            <div class="meal-actions"><button class="primary" onclick="toggleFed('${pmKey}')">${pmFed?'Undo':'Mark Fed'}</button><button onclick="openSwap('${key}','pm')">🔄 Swap</button><button onclick="openAddins('${key}','pm')">➕ Add</button></div>
          </div>
        </div>
        ${walkHtml}
        ${recentWalksHtml}
        <div class="card">
          <div class="card-title"><span class="icon">📊</span> Quick Stats</div>
          <div class="grid-3">
            <div class="text-center"><div style="font-size:24px;font-weight:800;color:var(--primary)">${state.walkLogs.filter(w=>w.date===todayKey()).length}</div><div class="text-xs text-muted">Walks today</div></div>
            <div class="text-center"><div style="font-size:24px;font-weight:800;color:var(--primary)">${Object.keys(state.fedLog).filter(k=>k.startsWith(todayKey())&&state.fedLog[k]).length}/2</div><div class="text-xs text-muted">Meals fed</div></div>
            <div class="text-center"><div style="font-size:24px;font-weight:800;color:var(--primary)">${metCount}/${AAFCO.length}</div><div class="text-xs text-muted">AAFCO met</div></div>
          </div>
        </div>
        ${resultItems.length ? `
        <div class="card">
          <div class="card-title"><span class="icon">🧮</span> Recent Calculator Results</div>
          <div class="dashboard-results">
            ${resultItems.map(r => `<div class="result-pill"><div class="val">${r.val}</div><div class="lbl">${r.label}</div></div>`).join('')}
          </div>
        </div>
        ` : ''}
      `;
    }

    // ── Walk Tracker functions (updated to update home) ──────────────────
    let walkInterval = null;
    let walkStartTime = null;
    let walkCoords = [];

    function startWalk() {
      if (!navigator.geolocation) return alert('GPS not available.');
      walkStartTime = Date.now();
      walkCoords = [];
      navigator.geolocation.watchPosition(pos => {
        walkCoords.push({ lat: pos.coords.latitude, lng: pos.coords.longitude });
        // Update home every second
        renderHome();
      }, null, { enableHighAccuracy: true, maximumAge: 3000, timeout: 20000 });
      walkInterval = setInterval(renderHome, 1000);
      renderHome();
    }

    function stopWalk() {
      if (walkInterval) clearInterval(walkInterval);
      walkInterval = null;
      if (walkStartTime) {
        const elapsed = (Date.now() - walkStartTime) / 1000;
        const mins = Math.floor(elapsed / 60);
        const secs = Math.floor(elapsed % 60);
        const dist = calcDist(walkCoords) * 0.621371; // miles
        // Save walk
        state.walkLogs.unshift({
          date: todayKey(),
          mins: mins,
          secs: secs,
          dist: dist,
          coords: walkCoords.slice()
        });
        // Keep only last 50 walks
        if (state.walkLogs.length > 50) state.walkLogs.length = 50;
        saveState();
        walkStartTime = null;
        walkCoords = [];
        renderHome();
        alert(`Walk saved! ${mins}m ${secs}s, ${dist.toFixed(2)} miles`);
      }
    }

    function calcDist(coords) {
      let total = 0;
      for (let i = 1; i < coords.length; i++) {
        const a = coords[i-1], b = coords[i];
        const dLat = (b.lat - a.lat) * Math.PI / 180;
        const dLng = (b.lng - a.lng) * Math.PI / 180;
        const h = Math.sin(dLat/2)**2 + Math.cos(a.lat * Math.PI/180) * Math.cos(b.lat * Math.PI/180) * Math.sin(dLng/2)**2;
        total += 6371 * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1-h));
      }
      return total; // km
    }

    function deleteWalkLog(idx) {
      state.walkLogs.splice(idx, 1);
      saveState();
      renderHome();
    }

    // ── Render functions (Plan, Nutrition, Utilities, Guide) omitted for brevity ──
    // They remain the same as before. I'll include them in the full final code.
    // ── Navigation and actions remain the same ──

    // ── Expose functions to global scope ──────────────────────────────────
    window.startWalk = startWalk;
    window.stopWalk = stopWalk;
    window.deleteWalkLog = deleteWalkLog;
    // ... (all other functions)

    // ── Init ───────────────────────────────────────────────────────────────
    function init() {
      loadState();
      document.querySelectorAll('.bottom-nav button').forEach(btn => btn.addEventListener('click', () => navigateTo(btn.dataset.page)));
      document.getElementById('themeToggle').addEventListener('click', toggleTheme);
      navigateTo('home');
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
