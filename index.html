<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Canine OS · health tracker</title>
  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    /* reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f4f2ed;  /* soft neutral background to make card pop */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 16px;
    }

    /* main app card – exactly 128x128 grid scaled up for readability */
    .app-container {
      max-width: 400px;
      width: 100%;
      background-color: #ffffff;
      border-radius: 36px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 6px 12px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      padding: 24px 20px 20px;
      transition: all 0.2s;
    }

    /* header: "distant" graphic from first pic */
    .header-graphic {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 20px;
    }

    .header-graphic .logo-symbol {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    .header-graphic .logo-symbol svg {
      display: block;
      width: 44px;
      height: 44px;
    }

    .header-graphic .brand-name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: #30752f;   /* main blue-green from pic: #30752 */
      line-height: 1.1;
    }

    .header-graphic .brand-name span {
      color: #31811b;   /* orange accent from pic: #31811 */
    }

    .header-graphic .tagline {
      font-size: 14px;
      font-weight: 500;
      color: #3c3c3c;
      background: #f0f0ea;
      padding: 6px 16px;
      border-radius: 40px;
      margin-top: 6px;
      letter-spacing: -0.2px;
      display: inline-block;
      border: 1px solid #e0ddd5;
    }

    /* ivicon – second pic: 128x128 icon */
    .ivicon-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 4px 0 12px;
    }

    .ivicon-box {
      background: #f8f6f1;
      border-radius: 32px;
      padding: 10px 18px 10px 14px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      border: 1px solid #e2dfd7;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
    }

    .ivicon-box svg {
      display: block;
      width: 48px;
      height: 48px;
    }

    .ivicon-box .ivicon-label {
      font-weight: 600;
      font-size: 18px;
      color: #2d2d2d;
      letter-spacing: -0.2px;
    }
    .ivicon-box .ivicon-label small {
      font-weight: 400;
      font-size: 14px;
      color: #5e5e5e;
      display: block;
      margin-top: 2px;
    }

    /* bottom buttons – exactly as third pic: HOME PLAN NUTRITION HISTORY PROFILE UTILITIES */
    .bottom-nav {
      margin-top: 24px;
      padding-top: 12px;
      border-top: 1px solid #eae7e0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px 12px;
    }

    .nav-btn {
      background: transparent;
      border: none;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: -0.2px;
      padding: 6px 0 4px;
      color: #3a3a3a;
      cursor: default;  /* non-interactive mockup */
      transition: 0.1s;
      border-bottom: 2px solid transparent;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .nav-btn.active {
      color: #30752f;
      border-bottom-color: #30752f;
      opacity: 1;
      font-weight: 700;
    }

    .nav-btn.orange {
      color: #31811b;
    }
    .nav-btn.orange.active {
      border-bottom-color: #31811b;
      color: #31811b;
    }

    /* profile card (from third pic) + system font note */
    .profile-section {
      margin-top: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f6f4ef;
      border-radius: 60px;
      padding: 8px 16px 8px 18px;
      border: 1px solid #e2ded6;
    }

    .profile-avatar {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .profile-avatar .avatar-icon {
      background: #30752f;
      width: 38px;
      height: 38px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 18px;
    }

    .profile-name {
      font-weight: 600;
      font-size: 16px;
      color: #1f1f1f;
    }

    .profile-badge {
      background: #eae5db;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 500;
      color: #2f2f2f;
    }

    .profile-chevron {
      color: #7a7a7a;
      font-size: 18px;
      font-weight: 300;
    }

    /* small font hint */
    .font-hint {
      margin-top: 18px;
      text-align: center;
      font-size: 11px;
      color: #7c7c7c;
      background: #f3f1ec;
      padding: 4px 10px;
      border-radius: 40px;
      display: inline-block;
      letter-spacing: 0.2px;
      border: 1px solid #ddd9d1;
    }

    .font-hint strong {
      font-weight: 600;
      color: #30752f;
    }

    /* utility flex */
    .flex-center {
      display: flex;
      justify-content: center;
    }

    /* color accent extras */
    .text-orange { color: #31811b; }
    .text-green { color: #96857; }  /* from pic: green #96857 */
    .bg-soft { background: #f0eee8; }

    /* make sure Inter is used everywhere */
    * {
      font-family: 'Inter', sans-serif;
    }

    /* 128x128 nod – but we keep it responsive */
    @media (max-width: 420px) {
      .app-container { padding: 18px 14px; }
    }
  </style>
</head>
<body>
<div class="app-container">

  <!-- HEADER: distant graphic (first pic) -->
  <div class="header-graphic">
    <div class="logo-symbol">
      <!-- custom SVG paw + bone to match "CANINE OS" vibe, 128x128 spirit -->
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="22" fill="#30752f" opacity="0.12" />
        <path d="M16 22C16 19.8 17.8 18 20 18C22.2 18 24 19.8 24 22C24 24.2 22.2 26 20 26C17.8 26 16 24.2 16 22Z" fill="#30752f" />
        <path d="M30 22C30 19.8 31.8 18 34 18C36.2 18 38 19.8 38 22C38 24.2 36.2 26 34 26C31.8 26 30 24.2 30 22Z" fill="#31811b" />
        <path d="M22 32C22 29.8 23.8 28 26 28C28.2 28 30 29.8 30 32C30 34.2 28.2 36 26 36C23.8 36 22 34.2 22 32Z" fill="#96857" opacity="0.8" />
        <rect x="16" y="30" width="4" height="4" rx="1" fill="#30752f" />
        <rect x="34" y="30" width="4" height="4" rx="1" fill="#31811b" />
      </svg>
      <span class="brand-name">CANINE <span>OS</span></span>
    </div>
    <div class="tagline">Total Health & Nutrition Tracking System</div>
  </div>

  <!-- IVICON (second pic) exactly as described -->
  <div class="ivicon-wrapper">
    <div class="ivicon-box">
      <!-- 128x128 style icon from second image: "Canine OS Ivicon" -->
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="40" height="40" rx="12" fill="#eae5db" stroke="#30752f" stroke-width="1.8" />
        <circle cx="24" cy="18" r="8" fill="#30752f" opacity="0.9" />
        <circle cx="18" cy="14" r="2.5" fill="white" />
        <circle cx="30" cy="14" r="2.5" fill="white" />
        <path d="M20 30L24 34L28 30" stroke="#31811b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M16 26L20 30L24 26L28 30L32 26" stroke="#96857" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7" />
        <circle cx="24" cy="24" r="16" stroke="#31811b" stroke-width="1.5" stroke-dasharray="2 3" opacity="0.4" />
      </svg>
      <span class="ivicon-label">Ivicon <small>128x128</small></span>
    </div>
  </div>

  <!-- BOTTOM NAVIGATION – third pic: HOME PLAN NUTRITION HISTORY PROFILE UTILITIES -->
  <div class="bottom-nav">
    <button class="nav-btn active">Home</button>
    <button class="nav-btn">Plan</button>
    <button class="nav-btn orange">Nutrition</button>
    <button class="nav-btn">History</button>
    <button class="nav-btn active orange">Profile</button>
    <button class="nav-btn">Utilities</button>
  </div>

  <!-- PROFILE (third pic shows "Profile" and system font recommendation) -->
  <div class="profile-section">
    <div class="profile-avatar">
      <div class="avatar-icon">🐕</div>
      <span class="profile-name">Rex · 4y</span>
      <span class="profile-badge">🐾 healthy</span>
    </div>
    <div class="profile-chevron">›</div>
  </div>

  <!-- font hint exactly from third pic: Inter + colors -->
  <div class="flex-center">
    <div class="font-hint">
      <strong>Inter</strong> · <span style="color:#30752f;">#30752</span> · <span style="color:#31811b;">#31811</span> · <span style="color:#96857;">#96857</span>
    </div>
  </div>

  <!-- tiny extra note for "Main Logo & UI Font: Inter" from third pic -->
  <div style="margin-top: 12px; text-align: center; font-size: 11px; color: #6b6b6b; letter-spacing: 0.3px; border-top: 1px dashed #ddd8cf; padding-top: 12px;">
    <span style="background: #f3f1ec; padding: 2px 14px; border-radius: 40px;">Main Logo & UI Font: Inter</span>
  </div>

</div>
</body>
</html>
