<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FRESHBOWL — Debug</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f7; padding: 20px; }
    #error { background: #ffebee; color: #b71c1c; padding: 12px; border-radius: 8px; margin-bottom: 16px; white-space: pre-wrap; display: none; border: 1px solid #ffcdd2; }
    #error.show { display: block; }
    #loading { background: #e3f2fd; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    #app { max-width: 600px; margin: 0 auto; }
    .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .title { font-weight: 700; font-size: 18px; }
  </style>
</head>
<body>
  <div id="error"></div>
  <div id="loading">⏳ Loading FRESHBOWL... (if this stays, JavaScript may be blocked or errored)</div>
  <div id="app"></div>

  <script>
    // ── Error catcher ──────────────────────────────────────────────────
    window.onerror = function(msg, url, line, col, error) {
      const el = document.getElementById('error');
      el.textContent = `❌ ${msg}\nLine: ${line}\n${error ? error.stack : ''}`;
      el.className = 'show';
      document.getElementById('loading').textContent = '❌ Error loading – see red box above.';
      return true;
    };

    // ── Simple test render ─────────────────────────────────────────────
    try {
      const app = document.getElementById('app');
      if (!app) throw new Error('App element not found!');

      // Render a minimal card to confirm JavaScript works
      app.innerHTML = `
        <div class="card">
          <div class="title">✅ FRESHBOWL is running!</div>
          <p>If you see this, JavaScript executed correctly.</p>
          <p>The full app will load now...</p>
        </div>
      `;
      document.getElementById('loading').textContent = '✅ Loaded – rendering full app...';

      // ── Now include the full app code ──────────────────────────────
      // (We'll include a condensed version of the full app – but for now
      //  let's just confirm the basics work.)

      // For debugging, we'll replace the minimal content with a full
      // version after a short delay to simulate loading.
      setTimeout(() => {
        // Placeholder: we'll add full app here once we confirm it works.
        // For now, we'll show a button to load the full app.
        app.innerHTML = `
          <div class="card">
            <div class="title">✅ Basic JavaScript works.</div>
            <p>Now we can add the full FRESHBOWL functionality.</p>
            <button onclick="loadFullApp()">Load Full App</button>
          </div>
        `;
      }, 500);

      // Define a function to load the full app (we'll paste the full code here later)
      window.loadFullApp = function() {
        alert('Full app loading – we will paste the complete code here.');
        // We'll replace this with the actual full app code.
      };

    } catch (e) {
      const el = document.getElementById('error');
      el.textContent = `CATCH ERROR: ${e.message}\n${e.stack || ''}`;
      el.className = 'show';
      document.getElementById('loading').textContent = '❌ Error – see red box.';
    }
  </script>
</body>
</html>
