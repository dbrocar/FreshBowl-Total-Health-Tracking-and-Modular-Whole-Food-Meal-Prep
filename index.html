<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FRESHBOWL — Total Health Tracking &amp; Modular Whole-Food Meal Prep</title>
  <meta name="theme-color" content="#f5f5f7" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Variables ──────────────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      /* Light theme (default) */
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface2: #f0f0f2;
      --border: #e0e0e2;
      --text: #1c1c1e;
      --text2: #3a3a3c;
      --text3: #8e8e93;
      --primary: #f5c842;
      --primary-dark: #e8b830;
      --primary-dim: rgba(245, 200, 66, 0.15);
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.04);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-full: 9999px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --transition: 0.2s ease;
    }
    [data-theme="dark"] {
      --bg: #0a0e1a;
      --surface: #141b2d;
      --surface2: #1a2338;
      --border: #1e2a3e;
      --text: #ffffff;
      --text2: #a0b4c8;
      --text3: #6a7f9a;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }
    /* ── Base ────────────────────────────────────────────────────────────── */
    html { font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      padding-bottom: 80px;
      transition: background var(--transition), color var(--transition);
    }
    /* ... (the rest of the CSS is the same as before, using the variables) ... */
    /* I'll skip repeating the full CSS here for brevity – you already have it.
       Just replace the :root and [data-theme] blocks with the ones above,
       and keep the rest unchanged. */
  </style>
  <!-- ... (the rest of the HTML and JS remains the same) ... -->
</body>
</html>
