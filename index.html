    try {
    // ═══════════════════════════════════════════════════════════════════════

      "Beef Heart": mkN(5.5,2.0,3,70,80,22,33,5,1.0,0.2,1.2,0.001,5,35,90,5,0.5,0.2,0.2,0.08,0.3,2.5,0.6,0.1,4.5,3,35,0.06),
      "Chicken Heart": mkN(5.4,2.6,3,68,75,24,36,5,1.8,0.25,1.3,0.001,8,30,140,10,0.4,0.3,0.2,0.1,0.5,3.5,1.0,0.15,6.0,35,60,0.06),
      "Kidney": mkN(5.0,1.0,4,85,80,24,36,5,1.4,0.15,1.0,0.003,20,25,80,500,20,0.2,1.0,0.15,0.6,2.8,1.2,0.2,15,45,70,0.08),
      "Blueberries": mkN(0.2,0.1,2,4,25,0,1,2,0.1,0.01,0.0,0,0.0,3,8,8,0,0.6,5,0.01,0.01,0.1,0.06,0.02,0,2,2),
    };

    // ── AAFCO Targets ──────────────────────────────────────────────────────
    const AAFCO = [
      { k:'protein', label:'Protein', unit:'g', min:45, max:999, group:'Macros' },
      { k:'fat', label:'Fat', unit:'g', min:13.8, max:55, group:'Macros' },
      { k:'calcium', label:'Calcium', unit:'mg', min:1250, max:2500, group:'Minerals' },
      { k:'phosphorus', label:'Phosphorus', unit:'mg', min:1000, max:4000, group:'Minerals' },
      { k:'potassium', label:'Potassium', unit:'mg', min:1378, max:9999, group:'Minerals' },
      { k:'sodium', label:'Sodium', unit:'mg', min:200, max:1500, group:'Minerals' },
      { k:'chloride', label:'Chloride', unit:'mg', min:300, max:9999, group:'Minerals' },
      { k:'magnesium', label:'Magnesium', unit:'mg', min:150, max:9999, group:'Minerals' },
      { k:'iron', label:'Iron', unit:'mg', min:10, max:250, group:'Minerals' },
      { k:'copper', label:'Copper', unit:'mg', min:1.83, max:25, group:'Minerals' },
      { k:'zinc', label:'Zinc', unit:'mg', min:15.0, max:100, group:'Minerals' },
      { k:'iodine', label:'Iodine', unit:'mg', min:0.22, max:2.75, group:'Minerals' },
      { k:'selenium', label:'Selenium', unit:'mcg', min:87.5, max:500, group:'Minerals' },
      { k:'omega3', label:'Omega-3', unit:'mg', min:110, max:9999, group:'Fatty Acids' },
      { k:'omega6', label:'Omega-6', unit:'mg', min:2800, max:9999, group:'Fatty Acids' },
      { k:'vitA', label:'Vitamin A', unit:'IU', min:1278, max:50000, group:'Vitamins' },
      { k:'vitD', label:'Vitamin D', unit:'IU', min:136, max:1800, group:'Vitamins' },
      { k:'vitE', label:'Vitamin E', unit:'IU', min:11, max:9999, group:'Vitamins' },
      { k:'vitK', label:'Vitamin K', unit:'mcg', min:82, max:9999, group:'Vitamins' },
      { k:'vitB1', label:'Thiamine B1', unit:'mg', min:0.56, max:9999, group:'Vitamins' },
      { k:'vitB2', label:'Riboflavin B2', unit:'mg', min:1.3, max:9999, group:'Vitamins' },
      { k:'vitB3', label:'Niacin B3', unit:'mg', min:4.25, max:9999, group:'Vitamins' },
      { k:'vitB5', label:'Pantothenic B5', unit:'mg', min:4.0, max:9999, group:'Vitamins' },
      { k:'vitB6', label:'Pyridoxine B6', unit:'mg', min:0.375, max:9999, group:'Vitamins' },
      { k:'vitB12', label:'Cobalamin B12', unit:'mcg', min:9.0, max:9999, group:'Vitamins' },
      { k:'folate', label:'Folate', unit:'mcg', min:68, max:9999, group:'Vitamins' },
      { k:'choline', label:'Choline', unit:'mg', min:425, max:9999, group:'Vitamins' },
      { k:'manganese', label:'Manganese', unit:'mg', min:1.69, max:9999, group:'Minerals' },
    ];
    const NUTRIENT_KEYS = AAFCO.map(a => a.k);

    // ── State ──────────────────────────────────────────────────────────────
    let state = {
      dogs: [],
      activeDogId: '',
      selectedProteins: ['Beef (85/15)','Ground Turkey','Pork Loin','Ground Chicken'],
      favorites: { vegs: [], starches: [], organs: [] },
      rotation: {},
      fedLog: {},
      addinsLog: {},
      swaps: {},
      suppChecks: {},
      walkLogs: [],
      walkerPin: '1234',
      theme: 'light',
      usdaKey: '',
      customFoods: {},
      utilsOpen: {},
      calcResults: {},
      petPhoto: '',
    };

    const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const PROTEIN_OPTIONS = ['Beef (85/15)','Ground Turkey','Ground Chicken','Pork Loin','Lamb','Veal','Bison','Duck','Sardines (canned)','Salmon (canned)'];
    const VEG_OPTIONS = ['Green Beans','Zucchini','Bell Peppers','Carrots','Peas','Spinach','Romaine Lettuce'];
    const STARCH_OPTIONS = ['Quinoa (cooked)','Sweet Potato (cooked)','Oats (cooked)','White Rice (cooked)'];
    const ORGAN_OPTIONS = ['Beef Liver','Chicken Liver','Beef Heart','Chicken Heart','Kidney'];

    // ── Helper: calculate MER ──────────────────────────────────────────────
    function calcMER(dog) {
      const kg = (dog.weight || 65) / 2.2046;
      const rer = 70 * Math.pow(kg, 0.75);
      return rer * (dog.activity || 1.6);
    }

    // ── State management ──────────────────────────────────────────────────
    function loadState() {
      try { const s = localStorage.getItem('freshbowl_state'); if (s) Object.assign(state, JSON.parse(s)); } catch(e) {}
      if (!state.dogs.length) state.dogs = [{ id:'dog1', name:'Bella', weight:65, activity:1.6, activityLabel:'Moderate (neutered)' }];
      if (!state.activeDogId) state.activeDogId = state.dogs[0].id;
      if (!state.selectedProteins.length) state.selectedProteins = ['Beef (85/15)','Ground Turkey','Pork Loin','Ground Chicken'];
      if (!state.rotation || !Object.keys(state.rotation).length) state.rotation = generateRotation(state.selectedProteins, state.favorites);
      Object.keys(state.customFoods || {}).forEach(name => { FOODS[name] = state.customFoods[name]; });
      if (!state.utilsOpen) state.utilsOpen = {};
      if (!state.calcResults) state.calcResults = {};
      applyTheme();
      saveState();
    }
    function saveState() { localStorage.setItem('freshbowl_state', JSON.stringify(state)); }

    // ── Rotation Engine ────────────────────────────────────────────────────
    function generateRotation(proteins, favs) {
      const mains = proteins.filter(p => !p.includes('Sardine') && !p.includes('Salmon'));
      const fish = proteins.filter(p => p.includes('Sardine') || p.includes('Salmon'));
      while (mains.length < 4) mains.push('Beef (85/15)');
      const mainA = { 1:mains[0], 2:mains[2], 3:mains[1], 4:mains[3] };
      const mainB = { 1:mains[1], 2:mains[3], 3:mains[0], 4:mains[2] };
      const alt   = { 1:fish[0]||mains[0], 2:fish[1]||mains[2], 3:fish[0]||mains[1], 4:fish[1]||mains[3] };
      const base = { /* same as before */ };
      // (I'll keep the full base from the earlier version)
      const result = {};
      let idx = 0;
      for (let w = 1; w <= 4; w++) {
        result[w] = {};
        for (const day of DAYS) {
          const b = base[w]?.[day]; if (!b) continue;
          const isAlt = (day === 'Thu' || day === 'Sun');
          const favStarch = favs.starches.length ? favs.starches[idx % favs.starches.length] : b.am.starch;
          const favVeg = favs.vegs.length ? favs.vegs[idx % favs.vegs.length] : b.am.veg;
          const favOrgan = favs.organs.length ? favs.organs[idx % favs.organs.length] : (b.am.organ || '');
          result[w][day] = {
            am: { protein: isAlt ? alt[w] : mainA[w], starch: favStarch, veg: favVeg, organ: favOrgan || null },
            pm: { protein: mainB[w], starch: favs.starches.length ? favs.starches[(idx+1)%favs.starches.length] : b.pm.starch,
                  veg: favs.vegs.length ? favs.vegs[(idx+1)%favs.vegs.length] : b.pm.veg,
                  organ: favs.organs.length ? favs.organs[(idx+1)%favs.organs.length] : b.pm.organ || null },
          };
          idx++;
        }
      }
      return result;
    }

    // ── Other helpers ──────────────────────────────────────────────────────
    function getActiveDog() { return state.dogs.find(d => d.id === state.activeDogId) || state.dogs[0]; }
    function dateKey(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
    function todayKey() { const d = new Date(); return dateKey(d.getFullYear(), d.getMonth(), d.getDate()); }
    function getWeekNumber(y,m,d) { const jan1 = new Date(y,0,1); const doy = Math.round((new Date(y,m,d)-jan1)/86400000); return (Math.floor(doy/7)%4)+1; }
    function getMealForDate(y,m,d,slot) {
      const week = getWeekNumber(y,m,d);
      const day = DAYS[new Date(y,m,d).getDay()];
      const wd = state.rotation[week]; if (!wd) return null;
      const dd = wd[day]; if (!dd) return null;
      return dd[slot] || null;
    }
    function getEffectiveMeal(y,m,d,slot) {
      const sch = getMealForDate(y,m,d,slot);
      if (!sch) return null;
      const key = dateKey(y,m,d) + '_' + slot;
      const sw = state.swaps?.[key] || {};
      return { protein: sw.protein || sch.protein, starch: sw.starch || sch.starch, veg: sw.veg || sch.veg, organ: sw.organ !== undefined ? sw.organ : sch.organ };
    }
    function isFish(p) { return p && (p.includes('Sardine') || p.includes('Salmon')); }

    // ── Nutrition Engine ──────────────────────────────────────────────────
    function zeroNutrients() { const o = {}; NUTRIENT_KEYS.forEach(k => o[k] = 0); return o; }
    function addFood(total, food, oz) {
      if (!food || !oz) return;
      NUTRIENT_KEYS.forEach(k => { if (food[k]) total[k] += food[k] * oz; });
    }
    function calcMealNutrition(y,m,d,slot) {
      const meal = getEffectiveMeal(y,m,d,slot);
      if (!meal) return zeroNutrients();
      const key = dateKey(y,m,d) + '_' + slot;
      const total = zeroNutrients();
      addFood(total, FOODS[meal.protein], 8);
      addFood(total, FOODS[meal.starch], 2.5);
      addFood(total, FOODS[meal.veg], 2.5);
      if (meal.organ) addFood(total, FOODS[meal.organ], 0.5);
      const supps = state.suppChecks?.[key] || {};
      if (supps.eggshell !== false) { total.calcium += 800; }
      if (supps.salt !== false) { total.sodium += 115; total.chloride += 175; total.iodine += 0.10; }
      if (supps.herbcube !== false) { total.vitE += 3.4; total.vitA += 10; total.vitK += 4; }
      if (supps.broth !== false) { const b = FOODS[meal.protein]; if (b) addFood(total, b, 0.75*0.08); }
      const addins = state.addinsLog?.[key] || {};
      Object.keys(addins).forEach(name => {
        const f = FOODS[name]; if (f) addFood(total, f, addins[name]);
      });
      return total;
    }
    function calcNutritionForDateRange(startDate, endDate) {
      const total = zeroNutrients();
      let mealCount = 0, dayCount = 0;
      let cur = new Date(startDate);
      while (cur <= endDate) {
        const y = cur.getFullYear(), m = cur.getMonth(), d = cur.getDate();
        const key = dateKey(y,m,d);
        let dayHasFed = false;
        for (const slot of ['am','pm']) {
          const logKey = key + '_' + slot;
          if (state.fedLog[logKey]) {
            const nut = calcMealNutrition(y,m,d,slot);
            NUTRIENT_KEYS.forEach(k => total[k] += nut[k]);
            mealCount++;
            dayHasFed = true;
          }
        }
        if (dayHasFed) dayCount++;
        cur.setDate(cur.getDate() + 1);
      }
      return { total, mealCount, dayCount };
    }
    function getAAFCOStatus(value, target) {
      if (value < target.min) return 'low';
      if (target.max < 9999 && value > target.max) return 'high';
      return 'ok';
    }

    // ── USDA Lookup ────────────────────────────────────────────────────────
    function searchUSDA(query, callback) {
      if (!state.usdaKey) { callback({ error: 'Please enter your USDA API key in Utilities.' }); return; }
      const url = `https://api.nal.usda.gov/fdc/v1/foods/search?api_key=${state.usdaKey}&query=${encodeURIComponent(query)}&pageSize=10`;
      fetch(url)
        .then(r => r.json())
        .then(data => { if (data.foods) callback(data.foods); else callback({ error: 'No results found.' }); })
        .catch(err => callback({ error: 'Network error. Check your connection.' }));
    }
    function getUSDAFoodDetails(fdcId, callback) {
      if (!state.usdaKey) { callback({ error: 'API key missing.' }); return; }
      const url = `https://api.nal.usda.gov/fdc/v1/food/${fdcId}?api_key=${state.usdaKey}`;
      fetch(url)
        .then(r => r.json())
        .then(data => callback(data))
        .catch(err => callback({ error: 'Failed to fetch details.' }));
    }
    function parseUSDAFood(foodDetail) {
      const nutMap = {
        'Protein': 'protein',
        'Total lipid (fat)': 'fat',
        'Calcium, Ca': 'calcium',
        'Phosphorus, P': 'phosphorus',
        'Potassium, K': 'potassium',
        'Sodium, Na': 'sodium',
        'Chloride, Cl': 'chloride',
        'Magnesium, Mg': 'magnesium',
