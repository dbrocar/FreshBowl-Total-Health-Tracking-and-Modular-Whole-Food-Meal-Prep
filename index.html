<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FRESHBOWL — Dog Health</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding-bottom: 70px; }
    .error-box { background: #ffebee; color: #b71c1c; padding: 10px; margin: 10px; border-radius: 8px; display: none; border: 1px solid #ffcdd2; }
    .error-box.show { display: block; }
    .header { background: #fff; padding: 12px 16px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
    .header-title { font-weight: 800; font-size: 18px; color: #f5c842; }
    .container { max-width: 600px; margin: 0 auto; padding: 16px; }
    .page { display: none; }
    .page.active { display: block; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 8px 0; backdrop-filter: blur(8px); }
    .bottom-nav button { background: none; border: none; font-size: 13px; font-weight: 500; color: #8e8e93; padding: 4px 12px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .bottom-nav button .icon { font-size: 22px; }
    .bottom-nav button.active { color: #f5c842; }
    .card { background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .card-title { font-weight: 700; font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .dog-switcher { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 8px 0; }
    .dog-switcher .name { font-size: 24px; font-weight: 800; }
    .dog-switcher .btn { background: #e8e8ed; border: 1px solid #ccc; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    .dog-switcher .add-btn { background: #f5c842; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 24px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .dog-count { font-size: 12px; color: #8e8e93; text-align: center; margin-top: 2px; }
    .dog-avatar { width: 64px; height: 64px; border-radius: 50%; background: #e8e8ed; border: 2px solid #f5c842; display: flex; align-items: center; justify-content: center; font-size: 32px; overflow: hidden; cursor: pointer; }
    .dog-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .dog-stats { display: flex; gap: 16px; flex-wrap: wrap; font-size: 14px; color: #3a3a3c; }
    .profile-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
    .profile-stat { background: #f0f0f2; border-radius: 10px; padding: 12px; text-align: center; }
    .profile-stat .val { font-size: 22px; font-weight: 800; color: #f5c842; }
    .profile-stat .lbl { font-size: 12px; color: #8e8e93; }
    .input-group { margin-bottom: 12px; }
    .input-group label { display: block; font-size: 13px; font-weight: 500; color: #3a3a3c; margin-bottom: 4px; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; background: #f8f8fa; }
    button { background: #f5c842; color: #000; border: none; padding: 10px 18px; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer; }
    button:hover { background: #e8b830; }
    button.secondary { background: #e8e8ed; color: #1c1c1e; border: 1px solid #ccc; }
    button:disabled { opacity: 0.5; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .mt-2 { margin-top: 8px; }
    .w-full { width: 100%; }
    .text-muted { color: #8e8e93; font-size: 13px; }
    .text-center { text-align: center; }
    .rolodex-card { background: #f0f0f2; border: 1px solid #ddd; border-radius: 12px; padding: 20px; min-height: 120px; position: relative; }
    .rolodex-card .name { font-size: 18px; font-weight: 700; color: #f5c842; }
    .rolodex-card .detail { font-size: 14px; color: #3a3a3c; margin-top: 4px; }
    .rolodex-card .notes { font-size: 13px; color: #8e8e93; font-style: italic; margin-top: 8px; }
    .rolodex-card .index { position: absolute; top: 12px; right: 16px; font-size: 12px; color: #8e8e93; }
    .rolodex-controls { display: flex; justify-content: center; gap: 16px; margin-top: 16px; align-items: center; flex-wrap: wrap; }
    .accordion-item { margin-bottom: 8px; }
    .accordion-header { display: flex; justify-content: space-between; padding: 12px 16px; background: #f0f0f2; border-radius: 10px; cursor: pointer; border: 1px solid #ddd; }
    .accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.3s; }
    .accordion-body.open { max-height: 3000px; padding: 8px 4px 0; }
    .vaccine-item { border-bottom: 1px solid #ddd; padding: 8px 0; display: flex; justify-content: space-between; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
    .modal { background: #fff; border-radius: 16px 16px 0 0; max-width: 600px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 20px; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .modal-close { background: none; border: none; font-size: 24px; padding: 0 8px; }
    @media (max-width: 480px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="errorDisplay" class="error-box"></div>

  <header class="header">
    <span class="header-title">FRESHBOWL</span>
    <span style="font-size:12px;color:#8e8e93;">🐾 Health</span>
  </header>

  <main class="container" id="app">
    <section id="page-home" class="page active"><div id="homeContent"></div></section>
    <section id="page-profile" class="page"><div id="profileContent"></div></section>
    <section id="page-utilities" class="page"><div id="utilitiesContent"></div></section>
  </main>

  <nav class="bottom-nav" id="bottomNav">
    <button data-page="home" class="active"><span class="icon">🏠</span>Home</button>
    <button data-page="profile"><span class="icon">🐾</span>Profile</button>
    <button data-page="utilities"><span class="icon">🧰</span>Utilities</button>
  </nav>

  <div id="modalRoot"></div>

  <script>
    // ---- GLOBAL ERROR CATCH ----
    window.onerror = function(msg, url, line, col, error) {
      const el = document.getElementById('errorDisplay');
      if (el) {
        el.textContent = '❌ ' + msg + ' (line ' + line + ')';
        el.className = 'error-box show';
      }
      return true;
    };

    // ---- STATE ----
    let state = {
      dogs: [{ id: 'dog1', name: 'Bella', weight: 65, activity: 1.6, activityLabel: 'Moderate' }],
      activeDogId: 'dog1',
      vaccines: [],
      vaccineRolodexIndex: 0,
      vetInfo: { name: '', clinic: '', phone: '', email: '', address: '', notes: '' },
      miscNotes: '',
      vaccineForm: { name: '', date: '', nextDate: '', notes: '' },
      utreeOpen: { calculators: true, vet: false, vaccines: false, misc: false },
      theme: 'light'
    };
    let petPhoto = '';

    // ---- STORAGE ----
    function saveState() {
      try { localStorage.setItem('fb_state', JSON.stringify(state)); } catch(e) {}
      try { if (petPhoto) localStorage.setItem('fb_photo', petPhoto); else localStorage.removeItem('fb_photo'); } catch(e) {}
    }
    function loadState() {
      try {
        const saved = localStorage.getItem('fb_state');
        if (saved) { const parsed = JSON.parse(saved); Object.assign(state, parsed); }
        const photo = localStorage.getItem('fb_photo');
        if (photo) petPhoto = photo;
      } catch(e) {}
    }

    // ---- HELPERS ----
    function getActiveDog() { return state.dogs.find(d => d.id === state.activeDogId) || state.dogs[0]; }
    function calcMER(dog) { const kg = (dog.weight || 65) / 2.2046; return 70 * Math.pow(kg, 0.75) * (dog.activity || 1.6); }

    // ---- RENDER HOME ----
    function renderHome() {
      const dog = getActiveDog();
      const total = state.dogs.length;
      const idx = state.dogs.findIndex(d => d.id === state.activeDogId);
      const html = `
        <div class="card">
          <div style="text-align:center;font-size:13px;color:#8e8e93;font-weight:500;">ACTIVE DOG</div>
          <div class="dog-switcher">
            <button class="btn" onclick="switchDog(-1)" ${total<=1?'disabled':''}>‹</button>
            <div style="text-align:center;">
              <div class="name">${dog ? dog.name : 'No dogs'}</div>
              <div class="dog-count">${total} dog${total>1?'s':''} · ${idx+1} of ${total}</div>
            </div>
            <button class="btn" onclick="switchDog(1)" ${total<=1?'disabled':''}>›</button>
            <button class="add-btn" onclick="openAddDogModal()">+</button>
          </div>
          ${dog ? `<div style="text-align:center;margin-top:4px;font-size:13px;color:#3a3a3c;">⚖️ ${dog.weight} lb · 🔥 ${Math.round(calcMER(dog))} kcal</div>` : ''}
        </div>
        <div class="card">
          <div class="card-title">💉 Vaccines</div>
          ${renderVaccineRolodex()}
          <div style="margin-top:12px;padding-top:12px;border-top:1px solid #ddd;">
            <div style="font-weight:600;font-size:14px;">Add New</div>
            <div class="grid-2">
              <div class="input-group"><label>Name</label><input type="text" id="vaccName" placeholder="e.g. Rabies" value="${state.vaccineForm.name}" oninput="updateVaxForm('name',this.value)" list="vaxList" /></div>
              <div class="input-group"><label>Date given</label><input type="date" id="vaccDate" value="${state.vaccineForm.date}" onchange="updateVaxForm('date',this.value)" /></div>
            </div>
            <div class="grid-2">
              <div class="input-group"><label>Next due</label><input type="date" id="vaccNext" value="${state.vaccineForm.nextDate}" onchange="updateVaxForm('nextDate',this.value)" /></div>
              <div class="input-group"><label>Notes</label><input type="text" id="vaccNotes" placeholder="Clinic name" value="${state.vaccineForm.notes}" onchange="updateVaxForm('notes',this.value)" /></div>
            </div>
            <datalist id="vaxList">
              <option value="Rabies">
              <option value="DHPP (Distemper/Parvo)">
              <option value="Bordetella">
              <option value="Lyme">
              <option value="Leptospirosis">
              <option value="Influenza">
              <option value="Kennel Cough">
            </datalist>
            <button class="w-full mt-2" onclick="addVaccine()">+ Add Vaccine</button>
          </div>
        </div>
      `;
      document.getElementById('homeContent').innerHTML = html;
    }

    // ---- VACCINE ROLODEX ----
    function renderVaccineRolodex() {
      const vax = state.vaccines || [];
      const total = vax.length;
      let idx = state.vaccineRolodexIndex || 0;
      if (idx >= total) idx = Math.max(0, total-1);
      if (idx < 0) idx = 0;
      state.vaccineRolodexIndex = idx;
      saveState();

      if (total === 0) {
        return `<div class="text-muted text-center" style="padding:20px;">No vaccines recorded yet.</div>`;
      }
      const v = vax[idx];
      return `
        <div class="rolodex-card">
          <div class="index">${idx+1} / ${total}</div>
          <div class="name">${v.name}</div>
          <div class="detail">📅 Given: ${v.date}</div>
          ${v.nextDate ? `<div class="detail">⏰ Next due: ${v.nextDate}</div>` : ''}
          ${v.notes ? `<div class="notes">📝 ${v.notes}</div>` : ''}
        </div>
        <div class="rolodex-controls">
          <button onclick="rolodexPrev()" ${idx<=0?'disabled':''}>◀ Prev</button>
          <button onclick="rolodexNext()" ${idx>=total-1?'disabled':''}>Next ▶</button>
          <button onclick="deleteCurrentVaccine()" style="background:#ff453a;color:#fff;">✕ Delete</button>
        </div>
      `;
    }

    function rolodexPrev() { if (state.vaccineRolodexIndex > 0) { state.vaccineRolodexIndex--; saveState(); renderHome(); } }
    function rolodexNext() { if (state.vaccineRolodexIndex < state.vaccines.length - 1) { state.vaccineRolodexIndex++; saveState(); renderHome(); } }
    function deleteCurrentVaccine() {
      const idx = state.vaccineRolodexIndex;
      if (state.vaccines.length === 0) return;
      if (!confirm('Delete "' + state.vaccines[idx].name + '"?')) return;
      state.vaccines.splice(idx, 1);
      if (state.vaccineRolodexIndex >= state.vaccines.length) state.vaccineRolodexIndex = Math.max(0, state.vaccines.length - 1);
      saveState();
      renderHome();
    }

    function updateVaxForm(field, value) { state.vaccineForm[field] = value; saveState(); }
    function addVaccine() {
      const name = state.vaccineForm.name.trim();
      const date = state.vaccineForm.date;
      if (!name || !date) { alert('Please enter name and date.'); return; }
      state.vaccines.push({ name, date, nextDate: state.vaccineForm.nextDate, notes: state.vaccineForm.notes.trim() });
      state.vaccineForm = { name: '', date: '', nextDate: '', notes: '' };
      state.vaccineRolodexIndex = state.vaccines.length - 1;
      saveState();
      renderHome();
    }

    // ---- DOG SWITCHER ----
    function switchDog(dir) {
      const idx = state.dogs.findIndex(d => d.id === state.activeDogId);
      const newIdx = (idx + dir + state.dogs.length) % state.dogs.length;
      state.activeDogId = state.dogs[newIdx].id;
      saveState();
      renderHome();
      renderProfile();
    }

    function openAddDogModal() {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.onclick = function(e) { if (e.target === overlay) closeModal(); };
      overlay.innerHTML = `
        <div class="modal" onclick="event.stopPropagation();">
          <div class="modal-header"><span style="font-weight:700;">Add Dog</span><button class="modal-close" onclick="closeModal()">✕</button></div>
          <div class="input-group"><label>Name</label><input type="text" id="newDogName" placeholder="e.g. Charlie" /></div>
          <div class="input-group"><label>Weight (lb)</label><input type="number" id="newDogWeight" value="50" /></div>
          <div class="input-group"><label>Activity</label>
            <select id="newDogActivity">
              <option value="1.2|Inactive">Inactive</option>
              <option value="1.4|Senior">Senior</option>
              <option value="1.6|Moderate (neutered)" selected>Moderate (neutered)</option>
              <option value="1.8|Active">Active</option>
              <option value="2.0|Working">Working</option>
            </select>
          </div>
          <button class="w-full" onclick="addDogFromModal()">Add Dog</button>
        </div>
      `;
      document.body.appendChild(overlay);
    }

    function addDogFromModal() {
      const name = document.getElementById('newDogName').value.trim() || 'New Dog';
      const weight = parseFloat(document.getElementById('newDogWeight').value) || 50;
      const actVal = document.getElementById('newDogActivity').value;
      const parts = actVal.split('|');
      const id = 'dog' + Date.now();
      state.dogs.push({ id, name, weight, activity: parseFloat(parts[0]), activityLabel: parts[1] || 'Moderate' });
      state.activeDogId = id;
      saveState();
      closeModal();
      renderHome();
      renderProfile();
    }

    function deleteDog(dogId) {
      if (state.dogs.length <= 1) { alert('You need at least one dog.'); return; }
      if (!confirm('Remove this dog and all data?')) return;
      state.dogs = state.dogs.filter(d => d.id !== dogId);
      if (state.activeDogId === dogId) state.activeDogId = state.dogs[0].id;
      saveState();
      renderHome();
      renderProfile();
    }

    function closeModal() {
      const overlay = document.querySelector('.modal-overlay');
      if (overlay) overlay.remove();
    }

    // ---- RENDER PROFILE ----
    function renderProfile() {
      const dog = getActiveDog();
      if (!dog) { document.getElementById('profileContent').innerHTML = '<div class="card"><div class="text-muted">No dogs.</div></div>'; return; }
      const mer = calcMER(dog);
      const html = `
        <div class="card">
          <div class="card-title">🐾 ${dog.name}'s Profile</div>
          <div style="display:flex;align-items:center;gap:16px;">
            <div class="dog-avatar" onclick="document.getElementById('photoInput').click()">
              ${petPhoto ? `<img src="${petPhoto}" alt="${dog.name}" />` : '🐕'}
              <input type="file" id="photoInput" accept="image/*" style="display:none;" onchange="handlePhoto(event)" />
            </div>
            <div>
              <div style="font-weight:700;font-size:20px;">${dog.name}</div>
              <div class="dog-stats">
                <span>⚖️ ${dog.weight} lb</span>
                <span>🏃 ${dog.activityLabel}</span>
                <span>🔥 ${Math.round(mer)} kcal/day</span>
              </div>
            </div>
          </div>
          <button class="secondary" style="margin-top:8px;" onclick="deleteDog('${dog.id}')">Remove Dog</button>
        </div>
        <div class="card">
          <div class="card-title">📊 Stats</div>
          <div class="profile-stats-grid">
            <div class="profile-stat"><div class="val">${dog.weight}</div><div class="lbl">Weight (lb)</div></div>
            <div class="profile-stat"><div class="val">${Math.round(mer)}</div><div class="lbl">Daily Calories</div></div>
            <div class="profile-stat"><div class="val">${dog.activity}</div><div class="lbl">Activity Factor</div></div>
            <div class="profile-stat"><div class="val">${state.dogs.length}</div><div class="lbl">Total Dogs</div></div>
          </div>
        </div>
        <div class="card">
          <div class="card-title">✏️ Edit</div>
          <div class="input-group"><label>Name</label><input type="text" value="${dog.name}" onchange="updateDog('name',this.value)" /></div>
          <div class="grid-2">
            <div class="input-group"><label>Weight (lb)</label><input type="number" value="${dog.weight}" onchange="updateDog('weight',parseFloat(this.value))" /></div>
            <div class="input-group"><label>Activity</label>
              <select onchange="updateDog('activity',this.value)">
                <option value="1.2|Inactive" ${dog.activity===1.2?'selected':''}>Inactive</option>
                <option value="1.4|Senior" ${dog.activity===1.4?'selected':''}>Senior</option>
                <option value="1.6|Moderate (neutered)" ${dog.activity===1.6?'selected':''}>Moderate (neutered)</option>
                <option value="1.8|Active" ${dog.activity===1.8?'selected':''}>Active</option>
                <option value="2.0|Working" ${dog.activity===2.0?'selected':''}>Working</option>
              </select>
            </div>
          </div>
          <button class="w-full" onclick="saveProfile()">Save Changes</button>
        </div>
      `;
      document.getElementById('profileContent').innerHTML = html;
    }

    function handlePhoto(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const MAX = 200;
          let w = img.width, h = img.height;
          if (w > MAX || h > MAX) { const ratio = Math.min(MAX/w, MAX/h); w = Math.round(w*ratio); h = Math.round(h*ratio); }
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          petPhoto = canvas.toDataURL('image/jpeg', 0.7);
          saveState();
          renderProfile();
          renderHome();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    function updateDog(field, val) {
      const dog = getActiveDog();
      if (field === 'name') dog.name = val;
      else if (field === 'weight') dog.weight = val;
      else if (field === 'activity') {
        const parts = val.split('|');
        dog.activity = parseFloat(parts[0]);
        dog.activityLabel = parts[1] || 'Moderate';
      }
      saveState();
      renderProfile();
      renderHome();
    }
    function saveProfile() { alert('Profile updated!'); }

    // ---- RENDER UTILITIES (with accordion) ----
    function renderUtilities() {
      const container = document.getElementById('utilitiesContent');
      // Build sections
      const sections = [
        { id: 'calculators', icon: '🧮', label: 'Calculators', content: calculatorContent() },
        { id: 'vet', icon: '🏥', label: 'Vet Info', content: vetContent() },
        { id: 'vaccines', icon: '💉', label: 'Vaccines (full list)', content: vaccineListContent() },
        { id: 'misc', icon: '📝', label: 'Misc Notes', content: miscContent() }
      ];
      let html = `<div class="card"><div class="card-title">🌳 Utilities</div>`;
      sections.forEach(s => {
        const open = state.utreeOpen[s.id] || false;
        html += `
          <div class="accordion-item">
            <div class="accordion-header" onclick="toggleTree('${s.id}')">
              <span>${s.icon} ${s.label}</span>
              <span style="transform:${open?'rotate(180deg)':'rotate(0)'};">▼</span>
            </div>
            <div class="accordion-body ${open?'open':''}">${s.content}</div>
          </div>
        `;
      });
      html += `</div>`;
      container.innerHTML = html;
    }

    function toggleTree(id) {
      state.utreeOpen[id] = !state.utreeOpen[id];
      saveState();
      renderUtilities();
    }

    function calculatorContent() {
      return `
        <div class="card"><div class="card-title">💧 Water</div><div class="input-group"><label>Weight (lb)</label><input type="number" id="waterW" value="${getActiveDog().weight||65}" /></div><button onclick="calcWater()">Calculate</button><div id="waterRes" class="mt-2 text-muted"></div></div>
        <div class="card"><div class="card-title">🧮 Calories</div><div class="grid-2"><div class="input-group"><label>Weight (kg)</label><input type="number" id="calW" value="25" /></div><div class="input-group"><label>Meals</label><select id="calM"><option value="2">2</option><option value="3">3</option></select></div></div><div class="input-group"><label>Activity</label><select id="calA"><option value="1.6">Moderate</option><option value="1.8">Active</option><option value="1.2">Inactive</option></select></div><button onclick="calcCal()">Calculate</button><div id="calRes" class="mt-2 text-muted"></div></div>
      `;
    }

    function calcWater() {
      const w = parseFloat(document.getElementById('waterW').value);
      if (!w) return alert('Enter weight');
      const oz = w, ml = oz*29.5735;
      document.getElementById('waterRes').innerHTML = `<strong>${oz.toFixed(0)} oz</strong> (${Math.round(ml)} ml) per day`;
    }
    function calcCal() {
      const w=parseFloat(document.getElementById('calW').value)||25;
      const m=parseInt(document.getElementById('calM').value)||2;
      const a=parseFloat(document.getElementById('calA').value)||1.6;
      const kg=w; const rer=70*Math.pow(kg,0.75); const mer=rer*a; const oz=mer/42;
      document.getElementById('calRes').innerHTML = `RER: ${Math.round(rer)} kcal · MER: ${Math.round(mer)} kcal · ~${oz.toFixed(1)} oz/day (${(oz/m).toFixed(1)} oz/meal)`;
    }

    function vetContent() {
      const v = state.vetInfo;
      return `
        <div class="card">
          <div class="input-group"><label>Vet name</label><input type="text" value="${v.name}" onchange="updateVet('name',this.value)" /></div>
          <div class="input-group"><label>Clinic</label><input type="text" value="${v.clinic}" onchange="updateVet('clinic',this.value)" /></div>
          <div class="input-group"><label>Phone</label><input type="text" value="${v.phone}" onchange="updateVet('phone',this.value)" /></div>
          <div class="input-group"><label>Email</label><input type="text" value="${v.email}" onchange="updateVet('email',this.value)" /></div>
          <div class="input-group"><label>Address</label><input type="text" value="${v.address}" onchange="updateVet('address',this.value)" /></div>
          <div class="input-group"><label>Notes</label><input type="text" value="${v.notes}" onchange="updateVet('notes',this.value)" /></div>
        </div>
      `;
    }
    function updateVet(field, val) { state.vetInfo[field] = val; saveState(); }

    function vaccineListContent() {
      const list = state.vaccines.map((v,i) => `<div class="vaccine-item"><span><strong>${v.name}</strong> (${v.date}) ${v.nextDate?'· due '+v.nextDate:''} ${v.notes?'· '+v.notes:''}</span><button onclick="deleteVaccine(${i})" style="background:#ff453a;color:#fff;padding:2px 10px;border-radius:20px;">✕</button></div>`).join('');
      return `<div class="card">${list || '<div class="text-muted">No vaccines.</div>'}</div>`;
    }
    function deleteVaccine(idx) { state.vaccines.splice(idx,1); saveState(); renderUtilities(); }

    function miscContent() {
      return `
        <div class="card">
          <textarea rows="4" style="width:100%;" onchange="saveMisc(this.value)">${state.miscNotes}</textarea>
          <div class="text-muted text-center mt-2">Auto-saved</div>
        </div>
      `;
    }
    function saveMisc(val) { state.miscNotes = val; saveState(); }

    // ---- NAVIGATION ----
    function navigateTo(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-'+page).classList.add('active');
      document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.toggle('active', b.dataset.page === page));
      if (page === 'home') renderHome();
      else if (page === 'profile') renderProfile();
      else if (page === 'utilities') renderUtilities();
      window.scrollTo(0,0);
    }

    // ---- INIT ----
    function init() {
      loadState();
      // Set up nav
      document.querySelectorAll('.bottom-nav button').forEach(btn => {
        btn.addEventListener('click', () => navigateTo(btn.dataset.page));
      });
      // Start with home
      navigateTo('home');
    }

    // Expose functions to global scope for inline onclick
    window.switchDog = switchDog;
    window.openAddDogModal = openAddDogModal;
    window.addDogFromModal = addDogFromModal;
    window.deleteDog = deleteDog;
    window.closeModal = closeModal;
    window.rolodexPrev = rolodexPrev;
    window.rolodexNext = rolodexNext;
    window.deleteCurrentVaccine = deleteCurrentVaccine;
    window.updateVaxForm = updateVaxForm;
    window.addVaccine = addVaccine;
    window.deleteVaccine = deleteVaccine;
    window.handlePhoto = handlePhoto;
    window.updateDog = updateDog;
    window.saveProfile = saveProfile;
    window.toggleTree = toggleTree;
    window.calcWater = calcWater;
    window.calcCal = calcCal;
    window.updateVet = updateVet;
    window.saveMisc = saveMisc;
    window.navigateTo = navigateTo;

    // Run
    init();
  </script>
</body>
</html>
