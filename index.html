<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canine OS</title>
  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #e8e4dc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      padding: 20px;
    }

    .app {
      max-width: 420px;
      width: 100%;
      background: #ffffff;
      border-radius: 40px;
      padding: 24px 20px 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
    }

    /* ---- HEADER (IMG_0674) ---- */
    .header img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 20px;
    }

    /* ---- IVICON (IMG_0675) ---- */
    .ivicon {
      display: flex;
      justify-content: center;
      margin: 16px 0 12px;
    }
    .ivicon img {
      max-width: 128px;
      width: 100%;
      height: auto;
      border-radius: 24px;
      border: 1px solid #ddd8cf;
    }

    /* ---- BOTTOM NAV (IMG_0676) ---- */
    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px 10px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #e6e1d8;
    }

    .nav-btn {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      background: transparent;
      border: none;
      padding: 4px 0;
      color: #4a4a4a;
      cursor: default;
      border-bottom: 2px solid transparent;
    }

    /* exact colors from your description */
    .nav-btn.active-blue {
      color: #30752f;
      border-bottom-color: #30752f;
    }
    .nav-btn.active-orange {
      color: #31811b;
      border-bottom-color: #31811b;
    }
    .nav-btn.active-green {
      color: #96857;
      border-bottom-color: #96857;
    }

    /* ---- PROFILE (from IMG_0676) ---- */
    .profile {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
      background: #f5f2ec;
      padding: 10px 16px 10px 18px;
      border-radius: 60px;
      border: 1px solid #e0dbd2;
    }

    .profile-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .profile-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #30752f;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      font-weight: 600;
    }

    .profile-name {
      font-weight: 600;
      font-size: 15px;
      color: #1e1e1e;
    }

    .profile-tag {
      font-size: 11px;
      background: #e3ded4;
      padding: 2px 12px;
      border-radius: 30px;
      font-weight: 500;
      color: #2c2c2c;
    }

    .profile-arrow {
      color: #8a8a8a;
      font-size: 20px;
      font-weight: 300;
    }

    /* ---- FONT & COLOR HINT (from IMG_0676) ---- */
    .hint {
      margin-top: 18px;
      text-align: center;
      font-size: 11px;
      color: #5e5e5e;
      background: #f2efe9;
      padding: 6px 12px;
      border-radius: 40px;
      display: inline-block;
      width: auto;
      border: 1px solid #ddd8cf;
      letter-spacing: 0.2px;
    }

    .hint strong {
      font-weight: 600;
      color: #1f1f1f;
    }

    .hint .c1 { color: #30752f; }
    .hint .c2 { color: #31811b; }
    .hint .c3 { color: #96857; }

    .flex-center {
      display: flex;
      justify-content: center;
    }

    .ui-font-note {
      text-align: center;
      font-size: 10px;
      color: #6b6b6b;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed #d7d2c8;
      letter-spacing: 0.4px;
    }
  </style>
</head>
<body>

<div class="app">

  <!-- HEADER: IMG_0674.webp (distant / header) -->
  <div class="header">
    <img src="IMG_0674.webp" alt="Canine OS Header" />
  </div>

  <!-- IVICON: IMG_0675.webp -->
  <div class="ivicon">
    <img src="IMG_0675.webp" alt="Canine OS Ivicon" />
  </div>

  <!-- BOTTOM NAV: IMG_0676.webp (buttons) -->
  <div class="nav">
    <span class="nav-btn active-blue">Home</span>
    <span class="nav-btn">Plan</span>
    <span class="nav-btn active-orange">Nutrition</span>
    <span class="nav-btn">History</span>
    <span class="nav-btn active-green">Profile</span>
    <span class="nav-btn">Utilities</span>
  </div>

  <!-- PROFILE (from IMG_0676) -->
  <div class="profile">
    <div class="profile-left">
      <div class="profile-avatar">🐕</div>
      <span class="profile-name">Rex · 4y</span>
      <span class="profile-tag">healthy</span>
    </div>
    <span class="profile-arrow">›</span>
  </div>

  <!-- FONT + COLOR HINT (from IMG_0676) -->
  <div class="flex-center">
    <div class="hint">
      <strong>Inter</strong> · <span class="c1">#30752</span> · <span class="c2">#31811</span> · <span class="c3">#96857</span>
    </div>
  </div>

  <div class="ui-font-note">Main Logo &amp; UI Font: Inter</div>

</div>

</body>
</html>
