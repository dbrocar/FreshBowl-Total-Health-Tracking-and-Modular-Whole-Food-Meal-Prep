<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FRESHBOWL — Total Health Tracking &amp; Modular Whole-Food Meal Prep</title>
  <meta name="theme-color" content="#0a0e1a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ────────────────────────────────────────────────────── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    :root {
      --bg: #0a0e1a;
      --surface: #141b2d;
      --surface2: #1a2338;
      --border: #1e2a3e;
      --text: #ffffff;
      --text2: #a0b4c8;
      --text3: #6a7f9a;
      --primary: #f5c842;
      --primary-dark: #e8b830;
      --primary-dim: rgba(245, 200, 66, 0.12);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-full: 9999px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --transition: 0.2s ease;
    }
    html {
      font-size: 16px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background var(--transition);
      padding-bottom: 80px;
    }
    a, button {
      font-family: var(--font);
      cursor: pointer;
    }
    input, select, textarea {
      font-family: var(--font);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      width: 100%;
      font-size: 14px;
      outline: none;
      transition: border var(--transition);
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-dim);
    }
    select {
      appearance: auto;
    }
    button {
      background: var(--primary);
      color: #0a0e1a;
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      font-weight: 600;
      font-size: 14px;
      transition: all var(--transition);
    }
    button:hover {
      background: var(--primary-dark);
      transform: scale(0.98);
    }
    button:active {
      transform: scale(0.95);
    }
    button.secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.secondary:hover {
      background: var(--border);
    }
    button.outline {
      background: transparent;
      color: var(--primary);
      border: 1px solid var(--primary);
    }
    button.outline:hover {
      background: var(--primary-dim);
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 16px;
    }
    /* ── Header ───────────────────────────────────────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.3px;
    }
    .header-title small {
      font-size: 10px;
      font-weight: 400;
      color: var(--text2);
      display: block;
      margin-top: -2px;
    }
    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .header-actions button {
      background: transparent;
      padding: 6px 10px;
      font-size: 20px;
      color: var(--text2);
      border-radius: var(--radius-sm);
    }
    .header-actions button:hover {
      background: var(--surface2);
    }
    .back-btn {
      display: none;
      background: transparent;
      padding: 6px 10px;
      font-size: 16px;
      color: var(--primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .back-btn:hover {
      background: var(--surface2);
    }
    /* ── Bottom Nav ───────────────────────────────────────────────────────── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 6px 0 env(safe-area-inset-bottom);
      z-index: 100;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .bottom-nav button {
      background: transparent;
      color: var(--text2);
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      border-radius: var(--radius-sm);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      transition: color var(--transition);
    }
    .bottom-nav button .icon {
      font-size: 22px;
      line-height: 1;
    }
    .bottom-nav button.active {
      color: var(--primary);
    }
    .bottom-nav button.active .icon {
      color: var(--primary);
    }
    .bottom-nav button:hover {
      color: var(--text);
    }
    /* ── Pages ────────────────────────────────────────────────────────────── */
    .page {
      display: none;
      padding: 16px 0 20px;
      animation: fadeUp 0.25s ease;
    }
    .page.active {
      display: block;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* ── Cards ────────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
    }
    .card-title .icon {
      font-size: 20px;
    }
    .card-sub {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    /* ── Grids ────────────────────────────────────────────────────────────── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    /* ── Badges & Pills ──────────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 600;
      background: var(--primary-dim);
      color: var(--primary);
    }
    .badge.green {
      background: rgba(52, 199, 89, 0.15);
      color: #34c759;
    }
    .badge.red {
      background: rgba(255, 69, 58, 0.15);
      color: #ff453a;
    }
    .badge.orange {
      background: rgba(255, 159, 10, 0.15);
      color: #ff9f0a;
    }
    /* ── Dog Profile ──────────────────────────────────────────────────────── */
    .dog-profile {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .dog-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--surface2);
      border: 2px solid var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .dog-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .dog-info {
      flex: 1;
    }
    .dog-name {
      font-size: 20px;
      font-weight: 700;
    }
    .dog-stats {
      font-size: 13px;
      color: var(--text2);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .dog-stats span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    /* ── Meal Cards ───────────────────────────────────────────────────────── */
    .meal-card {
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-bottom: 10px;
      border-left: 4px solid var(--border);
    }
    .meal-card.fed {
      border-left-color: #34c759;
      background: rgba(52, 199, 89, 0.06);
    }
    .meal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .meal-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text2);
    }
    .meal-fed {
      font-size: 12px;
      font-weight: 600;
      color: #34c759;
    }
    .meal-fed.not {
      color: var(--text3);
    }
    .meal-protein {
      font-size: 16px;
      font-weight: 700;
    }
    .meal-details {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6;
    }
    .meal-details .oz {
      color: var(--text3);
      font-size: 12px;
    }
    .meal-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .meal-actions button {
      padding: 4px 10px;
      font-size: 12px;
      border-radius: var(--radius-full);
      background: var(--surface);
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .meal-actions button:hover {
      background: var(--border);
      color: var(--text);
    }
    .meal-actions button.primary {
      background: var(--primary);
      color: #0a0e1a;
      border: none;
    }
    .meal-actions button.primary:hover {
      background: var(--primary-dark);
    }
    /* ── Donut Chart ─────────────────────────────────────────────────────── */
    .donut-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 0;
    }
    .donut-legend {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }
    .donut-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .donut-swatch {
      width: 12px;
      height: 12px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .donut-label {
      flex: 1;
      color: var(--text2);
    }
    .donut-val {
      color: var(--text);
      font-weight: 500;
    }
    /* ── Swaps & Modals ──────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn 0.2s;
    }
    .modal {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      max-width: 600px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 20px 16px;
      animation: slideUp 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }
    .modal-close {
      background: transparent;
      padding: 4px 8px;
      font-size: 24px;
      color: var(--text2);
    }
    .modal-close:hover {
      color: var(--text);
    }
    /* ── Input groups ────────────────────────────────────────────────────── */
    .input-group {
      margin-bottom: 12px;
    }
    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 4px;
    }
    .input-group .hint {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
    }
    /* ── Rotation Plan ───────────────────────────────────────────────────── */
    .rotation-week {
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-bottom: 12px;
    }
    .rotation-week-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .rotation-week-title {
      font-weight: 700;
      color: var(--primary);
    }
    .rotation-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .rotation-day {
      background: var(--surface);
      border-radius: 6px;
      padding: 4px 2px;
      text-align: center;
      font-size: 10px;
      border: 1px solid var(--border);
    }
    .rotation-day.fish {
      border-color: var(--primary);
      background: var(--primary-dim);
    }
    .rotation-day .day-label {
      font-weight: 600;
      color: var(--text2);
      font-size: 9px;
      text-transform: uppercase;
    }
    .rotation-day .am-pm {
      font-size: 9px;
      line-height: 1.3;
      color: var(--text);
    }
    .rotation-day .am-pm .pm {
      color: var(--text2);
    }
    /* ── Walk Tracker ────────────────────────────────────────────────────── */
    .walk-display {
      text-align: center;
      padding: 16px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      margin: 12px 0;
    }
    .walk-time {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 2px;
      color: var(--primary);
    }
    .walk-dist {
      font-size: 16px;
      color: var(--text2);
      margin-top: 4px;
    }
    .walk-points {
      font-size: 12px;
      color: var(--text3);
    }
    /* ── Responsive tweaks ───────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .grid-2 { grid-template-columns: 1fr; }
      .grid-3 { grid-template-columns: 1fr 1fr; }
      .dog-profile { flex-direction: column; text-align: center; }
      .dog-stats { justify-content: center; }
      .donut-wrap { flex-direction: column; align-items: stretch; }
    }
    /* ── Scrollable list for swaps ──────────────────────────────────────── */
    .swap-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
    }
    .swap-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      text-align: center;
      font-size: 13px;
      cursor: pointer;
      transition: all var(--transition);
    }
    .swap-item:hover {
      border-color: var(--primary);
      background: var(--primary-dim);
    }
    .swap-item.active {
      border-color: var(--primary);
      background: var(--primary-dim);
      color: var(--primary);
      font-weight: 600;
    }
    /* ── Misc ────────────────────────────────────────────────────────────── */
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .mt-2 { margin-top: 8px; }
    .mt-4 { margin-top: 16px; }
    .mb-2 { margin-bottom: 8px; }
    .mb-4 { margin-bottom: 16px; }
    .text-center { text-align: center; }
    .text-muted { color: var(--text2); }
    .text-sm { font-size: 13px; }
    .text-xs { font-size: 11px; }
    .gap-2 { gap: 8px; }
    .gap-4 { gap: 16px; }
    .flex { display: flex; }
    .flex-wrap { flex-wrap: wrap; }
    .items-center { align-items: center; }
    .w-full { width: 100%; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <!-- ─── Header ─────────────────────────────────────────────────────── -->
  <header class="header">
    <div>
      <div class="header-title">FRESHBOWL <small>Total Health Tracking &amp; Modular Whole-Food Meal Prep</small></div>
    </div>
    <div class="header-actions">
      <button id="themeToggle" aria-label="Toggle theme">🌙</button>
    </div>
  </header>

  <!-- ─── Pages ──────────────────────────────────────────────────────── -->
  <main class="container" id="app">

    <!-- HOME -->
    <section id="page-home" class="page active">
      <div id="homeContent"></div>
    </section>

    <!-- PLAN -->
    <section id="page-plan" class="page">
      <div id="planContent"></div>
    </section>

    <!-- NUTRITION -->
    <section id="page-nutrition" class="page">
      <div id="nutritionContent"></div>
    </section>

    <!-- UTILITIES -->
    <section id="page-utilities" class="page">
      <div id="utilitiesContent"></div>
    </section>

    <!-- GUIDE -->
    <section id="page-guide" class="page">
      <div id="guideContent"></div>
    </section>

  </main>

  <!-- ─── Bottom Nav ──────────────────────────────────────────────────── -->
  <nav class="bottom-nav" id="bottomNav">
    <button data-page="home" class="active"><span class="icon">🏠</span>Home</button>
    <button data-page="plan"><span class="icon">📋</span>Plan</button>
    <button data-page="nutrition"><span class="icon">📊</span>Nutrition</button>
    <button data-page="utilities"><span class="icon">🧰</span>Utilities</button>
    <button data-page="guide"><span class="icon">📖</span>Guide</button>
  </nav>

  <!-- ─── Modal Root ──────────────────────────────────────────────────── -->
  <div id="modalRoot"></div>

  <script>
    // ═══════════════════════════════════════════════════════════════════════
    //  FRESHBOWL – Full App Logic
    // ═══════════════════════════════════════════════════════════════════════

    // ── Constants ──────────────────────────────────────────────────────────
    const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const SHORT_DAYS = ['S','M','T','W','T','F','S'];
    const DEFAULT_PROTEINS = ['Beef (85/15)','Ground Turkey','Pork Loin','Ground Chicken'];
    const PROTEIN_OPTIONS = [
      'Beef (85/15)','Ground Turkey','Ground Chicken','Pork Loin',
      'Lamb','Veal','Bison','Duck','Sardines (canned)','Salmon (canned)'
    ];
    const VEG_OPTIONS = ['Green Beans','Zucchini','Bell Peppers','Carrots','Peas','Spinach','Romaine Lettuce'];
    const STARCH_OPTIONS = ['Quinoa (cooked)','Sweet Potato (cooked)','Oats (cooked)','White Rice (cooked)'];
    const ORGAN_OPTIONS = ['Beef Liver','Chicken Liver','Beef Heart','Chicken Heart','Kidney'];

    // ── State ──────────────────────────────────────────────────────────────
    let state = {
      dogs: [],
      activeDogId: '',
      selectedProteins: [...DEFAULT_PROTEINS],
      favorites: { vegs: [], starches: [], organs: [] },
      rotation: {},
      fedLog: {},
      addinsLog: {},
      suppChecks: {},
      notesLog: {},
      weightLog: {},
      symptomsLog: {},
      medications: [],
      grooming: [],
      vaccinations: [],
      vetInfo: {},
      walkLogs: [],
      walkerPin: '',
      theme: 'dark',
    };

    // ── Load / Save ────────────────────────────────────────────────────────
    function loadState() {
      try {
        const saved = localStorage.getItem('freshbowl_state');
        if (saved) {
          const parsed = JSON.parse(saved);
          Object.assign(state, parsed);
        }
      } catch (e) {}
      // Ensure defaults
      if (!state.dogs.length) {
        state.dogs = [{ id: 'dog1', name: 'Bella', weight: 65, activity: 1.6, activityLabel: 'Moderate (neutered)' }];
        state.activeDogId = 'dog1';
      }
      if (!state.activeDogId) state.activeDogId = state.dogs[0]?.id || 'dog1';
      if (!state.selectedProteins.length) state.selectedProteins = [...DEFAULT_PROTEINS];
      // Regenerate rotation if missing
      if (!state.rotation || !Object.keys(state.rotation).length) {
        state.rotation = generateRotation(state.selectedProteins, state.favorites);
      }
      applyTheme();
      saveState();
    }

    function saveState() {
      localStorage.setItem('freshbowl_state', JSON.stringify(state));
    }

    // ── Rotation Engine ────────────────────────────────────────────────────
    function generateRotation(proteins, favs) {
      const mains = proteins.filter(p => !p.includes('Sardine') && !p.includes('Salmon'));
      const fish = proteins.filter(p => p.includes('Sardine') || p.includes('Salmon'));
      while (mains.length < 4) mains.push('Beef (85/15)');
      const mainA = { 1: mains[0], 2: mains[2], 3: mains[1], 4: mains[3] };
      const mainB = { 1: mains[1], 2: mains[3], 3: mains[0], 4: mains[2] };
      const alt   = { 1: fish[0] || mains[0], 2: fish[1] || mains[2], 3: fish[0] || mains[1], 4: fish[1] || mains[3] };

      // Base template (simplified – you can expand from your original)
      const base = {
        1: {
          Sun: { am: { protein: 'Sardines (canned)', starch: 'Quinoa (cooked)', veg: 'Green Beans', organ: null },
                pm: { protein: 'Beef (85/15)', starch: 'Quinoa (cooked)', veg: 'Carrots', organ: 'Beef Heart' } },
          Mon: { am: { protein: 'Beef (85/15)', starch: 'Quinoa (cooked)', veg: 'Green Beans', organ: 'Beef Heart' },
                pm: { protein: 'Ground Turkey', starch: 'Oats (cooked)', veg: 'Zucchini', organ: 'Chicken Liver' } },
          Tue: { am: { protein: 'Beef (85/15)', starch: 'Sweet Potato (cooked)', veg: 'Bell Peppers', organ: 'Beef Heart' },
                pm: { protein: 'Ground Turkey', starch: 'Quinoa (cooked)', veg: 'Carrots', organ: 'Beef Liver' } },
          Wed: { am: { protein: 'Beef (85/15)', starch: 'Oats (cooked)', veg: 'Romaine Lettuce', organ: 'Beef Heart' },
                pm: { protein: 'Ground Turkey', starch: 'Sweet Potato (cooked)', veg: 'Green Beans', organ: 'Chicken Liver' } },

            }
          };
          mealIdx++;
        }
      }

    // ── Helpers ────────────────────────────────────────────────────────────
    function getWeekNumber(y, m, d) {
      const jan1 = new Date(y, 0, 1);
      const doy = Math.round((new Date(y, m, d) - jan1) / 86400000);
      return (Math.floor(doy / 7) % 4) + 1;
    }

    function getDayOfWeek(y, m, d) { return new Date(y, m, d).getDay(); }

    function getActiveDog() {
      return state.dogs.find(d => d.id === state.activeDogId) || state.dogs[0];
    }

    function getDogKey() {
      return state.activeDogId || 'dog1';
    }

    function dateKey(y, m, d) {
      return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }

    function todayKey() {
      const now = new Date();
      return dateKey(now.getFullYear(), now.getMonth(), now.getDate());
    }

    function getMealForDate(y, m, d, slot) {
      const week = getWeekNumber(y, m, d);
      const day = DAYS[getDayOfWeek(y, m, d)];
      const weekData = state.rotation[week];
      if (!weekData) return null;
      const dayData = weekData[day];
      if (!dayData) return null;
      return dayData[slot] || null;
    }

    function getEffectiveMeal(y, m, d, slot) {
      const scheduled = getMealForDate(y, m, d, slot);
      if (!scheduled) return null;
      const key = dateKey(y, m, d) + '_' + slot;
      const swaps = state.swaps?.[key] || {};
      return {
        protein: swaps.protein || scheduled.protein,
        starch: swaps.starch || scheduled.starch,
        veg: swaps.veg || scheduled.veg,
        organ: swaps.organ !== undefined ? swaps.organ : scheduled.organ,
      };
    }

    function isFish(protein) {
      return protein && (protein.includes('Sardine') || protein.includes('Salmon'));
    }

      const moisture = (amFed ? 8 : 0) + (pmFed ? 7 : 0);
      const ash = (amFed ? 3 : 0) + (pmFed ? 2 : 0);
      const total = protein + fat + carbs + moisture + ash || 1;

      const slices = [
        { label: 'Protein', val: protein, color: '#f5c842' },
        { label: 'Fat', val: fat, color: '#e8b830' },
        { label: 'Carbs', val: carbs, color: '#c9a030' },
        { label: 'Moisture', val: moisture, color: '#8a7a40' },
        { label: 'Ash', val: ash, color: '#5a4a30' },
      ].filter(s => s.val > 0.01);

      let donutHtml = '';
      if (slices.length) {
        const cx = 60, cy = 60, r = 50, ir = 30;
        let cum = -Math.PI/2;
        let paths = '';
        slices.forEach(s => {
          const angle = (s.val / total) * 2 * Math.PI;
          const x1 = cx + r * Math.cos(cum);
          const y1 = cy + r * Math.sin(cum);
          const x2 = cx + r * Math.cos(cum + angle);
          const y2 = cy + r * Math.sin(cum + angle);
          const xi1 = cx + ir * Math.cos(cum);
          const yi1 = cy + ir * Math.sin(cum);
          const xi2 = cx + ir * Math.cos(cum + angle);
          const yi2 = cy + ir * Math.sin(cum + angle);
          const large = angle > Math.PI ? 1 : 0;
          paths += `<path d="M${xi1.toFixed(1)} ${yi1.toFixed(1)} L${x1.toFixed(1)} ${y1.toFixed(1)} A${r} ${r} 0 ${large} 1 ${x2.toFixed(1)} ${y2.toFixed(1)} L${xi2.toFixed(1)} ${yi2.toFixed(1)} A${ir} ${ir} 0 ${large} 0 ${xi1.toFixed(1)} ${yi1.toFixed(1)} Z" fill="${s.color}" />`;
          cum += angle;
        });
        donutHtml = `
          <div class="donut-wrap">
            <svg width="120" height="120" viewBox="0 0 120 120">
              <circle cx="${cx}" cy="${cy}" r="${r}" fill="var(--surface2)" />
              ${paths}

            <div class="donut-legend">

      }

      container.innerHTML = `

          <div class="card-title"><span class="icon">📊</span> Today's Nutrition</div>
          ${donutHtml}
          <div class="grid-2 mt-2">

    // ── Navigation ─────────────────────────────────────────────────────────
    function navigateTo(page) {
      document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
      document.querySelectorAll('.bottom-nav button').forEach(btn => btn.classList.toggle('active', btn.dataset.page === page));
      // Re-render
      switch(page) {
        case 'home': renderHome(); break;
        case 'plan': renderPlan(); break;
        case 'nutrition': renderNutrition(); break;
        case 'utilities': renderUtilities(); break;
        case 'guide': renderGuide(); break;
      }
      window.scrollTo(0, 0);
    }

    // ── Actions ────────────────────────────────────────────────────────────
    function toggleFed(key) {
      state.fedLog[key] = !state.fedLog[key];
      saveState();
      renderHome();
      // Also refresh nutrition if open
      if (document.getElementById('page-nutrition').classList.contains('active')) renderNutrition();
    }

    function toggleProtein(p) {
      const idx = state.selectedProteins.indexOf(p);
      if (idx >= 0) state.selectedProteins.splice(idx, 1);
      else if (state.selectedProteins.length < 6) state.selectedProteins.push(p);
      saveState();
      renderPlan();
    }

    function toggleFav(cat, item) {
      const arr = state.favorites[cat];
      const idx = arr.indexOf(item);
      if (idx >= 0) arr.splice(idx, 1);
      else arr.push(item);
      saveState();
      renderPlan();
    }

    function rebuildRotation() {
      state.rotation = generateRotation(state.selectedProteins, state.favorites);
      saveState();
      renderPlan();
      alert('Rotation rebuilt!');
    }

    function updateDogProfile(field, val) {
      const dog = getActiveDog();
      if (field === 'name') dog.name = val;
      else if (field === 'weight') dog.weight = val;
      else if (field === 'activity') {
        const parts = val.split('|');
        dog.activity = parseFloat(parts[0]);
        dog.activityLabel = parts[1] || 'Moderate';
      }
      saveState();
      renderPlan();
      renderHome();
    }

    function calcMER(dog) {
      const kg = (dog.weight || 65) / 2.2046;
      const rer = 70 * Math.pow(kg, 0.75);
      return rer * (dog.activity || 1.6);
    }

    // ── Swap Modal ─────────────────────────────────────────────────────────
    function openSwap(dateKey, slot) {
      const y = parseInt(dateKey.split('-')[0]);
      const m = parseInt(dateKey.split('-')[1])-1;
      const d = parseInt(dateKey.split('-')[2]);
      const meal = getMealForDate(y, m, d, slot);
      if (!meal) return alert('No meal scheduled for this slot.');
      const key = dateKey + '_' + slot;
      const swaps = state.swaps?.[key] || {};

      let html = `
        <div class="modal-overlay" onclick="closeModal(event)">
          <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
              <span class="modal-title">Swap Ingredients</span>
              <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div style="margin-bottom:10px;">
              <div><strong>Protein:</strong> ${meal.protein}</div>
              <div><strong>Starch:</strong> ${meal.starch}</div>
              <div><strong>Veg:</strong> ${meal.veg}</div>
              <div><strong>Organ:</strong> ${meal.organ || 'None'}</div>
            </div>

              <select onchange="applySwap('${key}','protein',this.value)">
                <option value="">Keep</option>
                ${PROTEIN_OPTIONS.map(p => `<option value="${p}" ${swaps.protein === p ? 'selected' : ''}>${p}</option>`).join('')}
              </select>
            </div>
            <div class="input-group"><label>New Starch</label>
              <select onchange="applySwap('${key}','starch',this.value)">
                <option value="">Keep</option>
                ${STARCH_OPTIONS.map(s => `<option value="${s}" ${swaps.starch === s ? 'selected' : ''}>${s}</option>`).join('')}
              </select>
            </div>
            <div class="input-group"><label>New Vegetable</label>
              <select onchange="applySwap('${key}','veg',this.value)">
                <option value="">Keep</option>
                ${VEG_OPTIONS.map(v => `<option value="${v}" ${swaps.veg === v ? 'selected' : ''}>${v}</option>`).join('')}
              </select>
            </div>
            <div class="input-group"><label>New Organ</label>
              <select onchange="applySwap('${key}','organ',this.value)">
                <option value="">Keep</option>
                ${ORGAN_OPTIONS.map(o => `<option value="${o}" ${swaps.organ === o ? 'selected' : ''}>${o}</option>`).join('')}
                <option value="__none" ${swaps.organ === null ? 'selected' : ''}>None</option>

            <button class="secondary w-full" onclick="clearSwaps('${key}')">Reset all swaps</button>
          </div>

      `;
      document.getElementById('modalRoot').innerHTML = html;
    }

    function applySwap(key, category, value) {
      if (!state.swaps) state.swaps = {};
      if (!state.swaps[key]) state.swaps[key] = {};
      if (value === '' || value === '__none') {
        delete state.swaps[key][category];
        if (category === 'organ' && value === '__none') state.swaps[key].organ = null;
      } else {
        state.swaps[key][category] = value;
      }
      saveState();
      renderHome();
      closeModal();
    }

    function clearSwaps(key) {
      if (state.swaps) delete state.swaps[key];
      saveState();
      renderHome();
      closeModal();
    }

    function closeModal(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('modalRoot').innerHTML = '';
    }

    // ── Addins Modal ──────────────────────────────────────────────────────
    function openAddins(dateKey, slot) {
      const key = dateKey + '_' + slot;
      const addins = state.addinsLog?.[key] || {};
      let html = `
        <div class="modal-overlay" onclick="closeModal(event)">
          <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
              <span class="modal-title">Add Items</span>
              <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="input-group"><label>Add an ingredient (oz)</label>
              <div style="display:flex;gap:8px;">
                <input type="text" id="addinName" placeholder="e.g. Blueberries" />
                <input type="number" id="addinAmount" placeholder="oz" step="0.25" style="width:80px;" />
              </div>
              <button class="primary w-full mt-2" onclick="addAddin('${key}')">Add</button>
            </div>
            <div id="addinList" style="margin-top:10px;">
              ${Object.keys(addins).map(name => `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);">
                  <span>${name} – ${addins[name]} oz</span>
                  <button class="secondary" style="padding:2px 8px;font-size:12px;" onclick="removeAddin('${key}','${name}')">✕</button>

    function addAddin(key) {
      const name = document.getElementById('addinName').value.trim();
      const amount = parseFloat(document.getElementById('addinAmount').value);
      if (!name || !amount) return alert('Enter a name and amount.');
      if (!state.addinsLog) state.addinsLog = {};
      if (!state.addinsLog[key]) state.addinsLog[key] = {};
      state.addinsLog[key][name] = (state.addinsLog[key][name] || 0) + amount;
      saveState();
      openAddins(key.split('_')[0], key.split('_')[1]);
    }

    function removeAddin(key, name) {
      if (state.addinsLog?.[key]) {
        delete state.addinsLog[key][name];
        saveState();
        openAddins(key.split('_')[0], key.split('_')[1]);
      }
    }

    // ── Walk Tracker ──────────────────────────────────────────────────────
    let walkInterval = null;
    let walkStartTime = null;
    let walkCoords = [];

    function startWalk() {
      if (!navigator.geolocation) return alert('GPS not available.');
      walkStartTime = Date.now();
      walkCoords = [];
      navigator.geolocation.watchPosition(pos => {
        walkCoords.push({ lat: pos.coords.latitude, lng: pos.coords.longitude });
        updateWalkDisplay();
      }, null, { enableHighAccuracy: true });
      walkInterval = setInterval(updateWalkDisplay, 1000);
      document.querySelector('#walkDisplay .walk-time').textContent = '00:00';
      document.querySelector('#walkDisplay .walk-dist').textContent = '0.00 miles';
    }

    function stopWalk() {
      if (walkInterval) clearInterval(walkInterval);
      walkInterval = null;
      if (walkStartTime) {
        const elapsed = (Date.now() - walkStartTime) / 1000;
        const mins = Math.floor(elapsed / 60);
        const secs = Math.floor(elapsed % 60);
        const dist = calcDist(walkCoords) * 0.621371; // km to miles
        state.walkLogs.push({
          date: todayKey(),
          mins,
          secs,
          dist: dist,
          coords: walkCoords.slice()
        });
        saveState();
        alert(`Walk saved! ${mins}m ${secs}s, ${dist.toFixed(2)} miles`);
        walkStartTime = null;
        walkCoords = [];
        renderUtilities();
      }
    }

    function updateWalkDisplay() {
      if (!walkStartTime) return;
      const elapsed = (Date.now() - walkStartTime) / 1000;
      const mins = Math.floor(elapsed / 60);
      const secs = Math.floor(elapsed % 60);
      const dist = calcDist(walkCoords) * 0.621371;
      document.querySelector('#walkDisplay .walk-time').textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
      document.querySelector('#walkDisplay .walk-dist').textContent = `${dist.toFixed(2)} miles`;
      document.querySelector('#walkDisplay .walk-points').textContent = `${walkCoords.length} GPS points`;
    }

    function calcDist(coords) {
      let total = 0;
      for (let i = 1; i < coords.length; i++) {
        const a = coords[i-1], b = coords[i];
        const dLat = (b.lat - a.lat) * Math.PI / 180;
        const dLng = (b.lng - a.lng) * Math.PI / 180;
        const haversine = Math.sin(dLat/2)**2 + Math.cos(a.lat * Math.PI/180) * Math.cos(b.lat * Math.PI/180) * Math.sin(dLng/2)**2;
        total += 6371 * 2 * Math.atan2(Math.sqrt(haversine), Math.sqrt(1-haversine));
      }
      return total;
    }

    function showWalkerLogin() {
      const html = `
        <div class="modal-overlay" onclick="closeModal(event)">
          <div class="modal" onclick="event.stopPropagation()">

              <span class="modal-title">Walker Login</span>

          </div>
        </div>
      `;
      document.getElementById('modalRoot').innerHTML = html;
    }

    function loginWalker() {
      const pin = document.getElementById('walkerPin').value;

        closeModal();
      } else {
        alert('Incorrect PIN.');
      }

    // ── Calculators ────────────────────────────────────────────────────────
    function runCalorieCalc() {
      const weight = parseFloat(document.getElementById('calcWeight').value) || 25;
      const meals = parseInt(document.getElementById('calcMeals').value) || 2;
      const activity = parseFloat(document.getElementById('calcActivity').value) || 1.6;
      const kg = weight;
      const rer = 70 * Math.pow(kg, 0.75);
      const mer = rer * activity;
      const ozPerDay = mer / 42;
      document.getElementById('calcResult').innerHTML = `
        <div>RER: <strong>${Math.round(rer)}</strong> kcal</div>
        <div>MER: <strong>${Math.round(mer)}</strong> kcal/day</div>
        <div>~${ozPerDay.toFixed(1)} oz/day (${(ozPerDay/meals).toFixed(1)} oz/meal)</div>
      `;
    }

    function generateFleaSchedule() {
      const date = document.getElementById('fleaDate').value;
      const freq = parseInt(document.getElementById('fleaFreq').value) || 30;
      if (!date) return alert('Select a date.');
      const d = new Date(date + 'T00:00:00');
      const dates = [];
      for (let i = 0; i < 6; i++) {
        d.setDate(d.getDate() + freq);
        dates.push(d.toISOString().split('T')[0]);
      }
      document.getElementById('fleaResult').innerHTML = `<strong>Next due dates:</strong><br>${dates.join(' · ')}`;
    }

    function calcChocolate() {
      const weight = parseFloat(document.getElementById('chocWeight').value) || 25;
      const amount = parseFloat(document.getElementById('chocAmount').value) || 0;
      const type = parseInt(document.getElementById('chocType').value) || 150;
      if (amount <= 0) return alert('Enter amount eaten.');
      const dose = (amount * (type / 1000) / weight) * 1000; // mg/kg
      let risk = 'Low', color = '#34c759';
      if (dose > 200) { risk = 'Extreme – emergency!'; color = '#ff453a'; }
      else if (dose > 100) { risk = 'High – call vet'; color = '#ff9f0a'; }
      else if (dose > 40) { risk = 'Moderate – watch closely'; color = '#ff9f0a'; }
      document.getElementById('chocResult').innerHTML = `
        <div style="color:${color};font-weight:700;">${risk}</div>
        <div>Dose: ${dose.toFixed(1)} mg/kg</div>
        <div class="text-xs text-muted">Contact your vet if concerned.</div>
      `;
    }

    function calcTreats() {
      const weight = parseFloat(document.getElementById('treatWeight').value) || 25;
      const kg = weight;
      const rer = 70 * Math.pow(kg, 0.75);
      const mer = rer * 1.6;
      const budget = mer * 0.10;
      document.getElementById('treatResult').innerHTML = `
        <div>10% treat budget: <strong>${Math.round(budget)}</strong> kcal/day</div>
        <div class="text-xs text-muted">That's about ${Math.round(budget/5)} baby carrots or ${Math.round(budget/10)} small treats.</div>
      `;
    }

    function calcCost() {
      const price = parseFloat(document.getElementById('costPrice').value) || 0;
      const bag = parseFloat(document.getElementById('costBag').value) || 0;
      const portion = parseFloat(document.getElementById('costPortion').value) || 0;
      if (!price || !bag || !portion) return alert('Fill all fields.');
      const days = (bag * 1000) / portion;
      const costPerDay = price / days;
      document.getElementById('costResult').innerHTML = `
        <div>Bag lasts ~${days.toFixed(1)} days</div>
        <div><strong>$${costPerDay.toFixed(2)}</strong> per day</div>
        <div class="text-xs text-muted">$${(costPerDay*30).toFixed(2)}/month · $${(costPerDay*365).toFixed(2)}/year</div>
      `;
    }

    // ── Theme ──────────────────────────────────────────────────────────────
    function applyTheme() {
      const dark = state.theme === 'dark';
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      document.getElementById('themeToggle').textContent = dark ? '🌙' : '☀️';
    }

    function toggleTheme() {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      applyTheme();
      saveState();
    }

    function init() {
      loadState();
      // Set default walker pin
      if (!state.walkerPin) state.walkerPin = '1234';

      // Navigation

        btn.addEventListener('click', () => navigateTo(btn.dataset.page));
      });
      document.getElementById('themeToggle').addEventListener('click', toggleTheme);

      // Show home
      navigateTo('home');
    }

    // Expose functions to global scope for inline onclick
    window.navigateTo = navigateTo;
    window.toggleFed = toggleFed;
    window.toggleProtein = toggleProtein;
    window.toggleFav = toggleFav;
    window.rebuildRotation = rebuildRotation;
    window.updateDogProfile = updateDogProfile;
    window.openSwap = openSwap;
    window.openAddins = openAddins;
    window.applySwap = applySwap;
    window.clearSwaps = clearSwaps;
    window.closeModal = closeModal;
    window.addAddin = addAddin;
    window.removeAddin = removeAddin;
    window.startWalk = startWalk;
    window.stopWalk = stopWalk;
    window.showWalkerLogin = showWalkerLogin;
    window.loginWalker = loginWalker;
    window.runCalorieCalc = runCalorieCalc;
    window.generateFleaSchedule = generateFleaSchedule;
    window.calcChocolate = calcChocolate;
    window.calcTreats = calcTreats;
    window.calcCost = calcCost;
    window.toggleTheme = toggleTheme;

    document.addEventListener('DOMContentLoaded', init);
  </script>
